x-env: &env
  DATABASE_URI: "mariadb+pymysql://bunkerweb:secret@bw-db:3306/db"
  DOCKER_HOST: "tcp://bw-docker:2375"
  AUTOCONF_MODE: "yes"
  LOG_LEVEL: "info"
  CUSTOM_LOG_LEVEL: "debug"
  USE_REDIS: "yes"
  REDIS_HOST: "bw-jobs-broker"
  REDIS_PORT: "6379"
  REDIS_DATABASE: "1"
  API_URL: "http://bw-api:8888"
  API_TOKEN: "devsecrettoken"

services:
  bunkerweb:
    build:
      context: ../..
      dockerfile: ./src/bw/Dockerfile
      args:
        SKIP_MINIFY: "yes"
    depends_on:
      - bw-jobs-broker
    ports:
      - 80:8080/tcp
      - 443:8443/tcp
      - 443:8443/udp
    labels:
      - "bunkerweb.INSTANCE=yes"
    environment:
      API_WHITELIST_IP: "127.0.0.0/24 10.20.30.0/24"
      USE_REDIS: "yes"
      REDIS_HOST: "bw-jobs-broker"
      REDIS_PORT: "6379"
      REDIS_DATABASE: "1"
    restart: "unless-stopped"
    networks:
      bw-universe:
        aliases:
          - bunkerweb
      bw-services:
        aliases:
          - bunkerweb

  bw-autoconf:
    build:
      context: ../..
      dockerfile: ./src/autoconf/Dockerfile
    depends_on:
      - bunkerweb
      - bw-docker
      - bw-api
    environment:
      <<: *env
      CELERY_BROKER_URL: "redis://bw-jobs-broker:6379/0"
    restart: "unless-stopped"
    networks:
      bw-universe:
        aliases:
          - bw-autoconf
      bw-db:
        aliases:
          - bw-autoconf
      bw-docker:
        aliases:
          - bw-autoconf

  bw-scheduler:
    build:
      context: ../..
      dockerfile: ./src/scheduler/Dockerfile
    depends_on:
      - bunkerweb
      - bw-jobs-broker
    volumes:
      - bw-storage:/data
    environment:
      <<: *env
      CELERY_BROKER_URL: "redis://bw-jobs-broker:6379/0"
      BUNKERWEB_INSTANCES: ""
      SERVER_NAME: ""
      MULTISITE: "yes"
      API_WHITELIST_IP: "127.0.0.0/24 10.20.30.0/24"
      USE_BUNKERNET: "no"
      USE_BLACKLIST: "no"
      USE_WHITELIST: "no"
      SEND_ANONYMOUS_REPORT: "no"
      LOG_LEVEL: "info"
      SERVE_FILES: "no"
      DISABLE_DEFAULT_SERVER: "yes"
      USE_CLIENT_CACHE: "yes"
      USE_GZIP: "yes"
    restart: "unless-stopped"
    networks:
      bw-universe:
        aliases:
          - bw-scheduler
      bw-db:
        aliases:
          - bw-scheduler

  bw-api:
    build:
      context: ../..
      dockerfile: ./src/api/Dockerfile
    depends_on:
      - bw-jobs-broker
    ports:
      - 8888:8888
    volumes:
      - ../../src/api/app:/usr/share/bunkerweb/api/app:ro
      - ../../src/api/utils:/usr/share/bunkerweb/api/utils:ro
    environment:
      <<: *env
      CELERY_BROKER_URL: "redis://bw-jobs-broker:6379/0"
      API_USERNAME: "admin"
      API_PASSWORD: "P@ssw0rd"
      OVERRIDE_API_CREDS: "yes"
      API_RATE_LIMIT_ENABLED: "no"
      FORWARDED_ALLOW_IPS: "*"
      DEBUG: "1"
      MAX_WORKERS: "1"
      MAX_THREADS: "4"
    restart: "unless-stopped"
    networks:
      bw-universe:
        aliases:
          - bw-api
      bw-db:
        aliases:
          - bw-api

  bw-worker:
    build:
      context: ../..
      dockerfile: ./src/worker/Dockerfile
    depends_on:
      - bw-jobs-broker
      - bw-db
    volumes:
      - bw-worker-storage:/data
    environment:
      <<: *env
      CELERY_BROKER_URL: "redis://bw-jobs-broker:6379/0"
      WORKER_CONCURRENCY: "2"
      WORKER_QUEUES: "default,heavy"
    restart: "unless-stopped"
    networks:
      bw-universe:
        aliases:
          - bw-worker
      bw-db:
        aliases:
          - bw-worker

  bw-jobs-broker:
    image: valkey/valkey:8-alpine
    command:
      [
        "valkey-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "noeviction",
      ]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: "unless-stopped"
    networks:
      bw-universe:
        aliases:
          - bw-jobs-broker

  bw-db:
    image: mariadb:11
    command: --max-allowed-packet=67108864
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: "db"
      MYSQL_USER: "bunkerweb"
      MYSQL_PASSWORD: "secret"
    volumes:
      - bw-data:/var/lib/mysql
    restart: "unless-stopped"
    networks:
      bw-db:
        aliases:
          - bw-db

  bw-docker:
    image: tecnativa/docker-socket-proxy:nightly
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      LOG_LEVEL: "warning"
    restart: "unless-stopped"
    networks:
      bw-docker:
        aliases:
          - bw-docker

  app1:
    image: bunkerity/bunkerweb-hello:v1.0
    restart: "unless-stopped"
    networks:
      bw-services:
        aliases:
          - app1
    labels:
      - "bunkerweb.SERVER_NAME=app1.example.com"
      - "bunkerweb.USE_REVERSE_PROXY=yes"
      - "bunkerweb.REVERSE_PROXY_URL=/"
      - "bunkerweb.REVERSE_PROXY_HOST=http://app1:8080"

volumes:
  bw-data:
  bw-storage:
  bw-worker-storage:

networks:
  bw-universe:
    name: bw-universe
    ipam:
      driver: default
      config:
        - subnet: 10.20.30.0/24
  bw-services:
    name: bw-services
  bw-db:
    name: bw-db
  bw-docker:
    name: bw-docker
