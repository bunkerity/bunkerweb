name: Build container (REUSABLE)

on:
  workflow_call:
    inputs:
      RELEASE:
        required: true
        type: string
      ARCH:
        required: true
        type: string
      IMAGE:
        required: true
        type: string
      DOCKERFILE:
        required: true
        type: string
      CACHE:
        required: false
        type: boolean
        default: true
      PUSH:
        required: false
        type: boolean
        default: true
      CACHE_SUFFIX:
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true
      ARM_SSH_KEY:
        required: false
      ARM_SSH_IP:
        required: false
      ARM_SSH_CONFIG:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Prepare
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Replace VERSION
        if: inputs.RELEASE == 'testing' || inputs.RELEASE == 'dev'
        run: chmod +x ./misc/update-version.sh && ./misc/update-version.sh ${{ inputs.RELEASE }}
      - name: Replace VERSION 1.5
        if: inputs.RELEASE == '1.5'
        run: chmod +x ./misc/update-version.sh && ./misc/update-version.sh dev
      - name: Setup SSH for ARM node
        if: startsWith(inputs.CACHE_SUFFIX, 'arm')
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa_arm
          chmod 600 ~/.ssh/id_rsa_arm
          echo "$SSH_CONFIG" | sed "s/SSH_IP/$SSH_IP/g" > ~/.ssh/config
          # Enhanced keepalive and timeout settings for long-running builds
          cat >> ~/.ssh/config << 'EOF'
          ServerAliveInterval 15
          ServerAliveCountMax 20
          TCPKeepAlive yes
          ConnectTimeout 30
          ConnectionAttempts 3
          ControlMaster auto
          ControlPath ~/.ssh/control-%C
          ControlPersist 1h
          StrictHostKeyChecking no
          EOF
        env:
          SSH_KEY: ${{ secrets.ARM_SSH_KEY }}
          SSH_IP: ${{ secrets.ARM_SSH_IP }}
          SSH_CONFIG: ${{ secrets.ARM_SSH_CONFIG }}
      - name: Setup Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: startsWith(inputs.CACHE_SUFFIX, 'arm') == false
      - name: Setup Buildx (ARM)
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: startsWith(inputs.CACHE_SUFFIX, 'arm')
        with:
          endpoint: ssh://root@arm
          platforms: linux/arm64,linux/arm/v7
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Login to ghcr
        if: inputs.PUSH == true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Compute metadata
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: bunkerity/${{ inputs.IMAGE }}
      # Build cached image
      - name: Build image
        if: inputs.CACHE == true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ inputs.DOCKERFILE }}
          platforms: ${{ inputs.ARCH }}
          load: true
          tags: local/${{ inputs.IMAGE }}
          cache-from: type=registry,ref=docker.io/bunkerity/bw-images-cache:${{ inputs.IMAGE }}-${{ inputs.RELEASE }}
          cache-to: type=registry,ref=docker.io/bunkerity/bw-images-cache:${{ inputs.IMAGE }}-${{ inputs.RELEASE }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
        env:
          DOCKER_BUILD_SUMMARY: "false" # skip the docker/build-push-action job summary; Trivy publishes its own
      # Build non-cached image
      - name: Build image
        if: inputs.CACHE != true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ inputs.DOCKERFILE }}
          platforms: ${{ inputs.ARCH }}
          load: ${{ startsWith(inputs.CACHE_SUFFIX, 'arm') == false }}
          tags: local/${{ inputs.IMAGE }}
          cache-to: type=registry,ref=docker.io/bunkerity/bw-images-cache:${{ inputs.IMAGE }}-${{ inputs.RELEASE }}-${{ inputs.CACHE_SUFFIX }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
        env:
          DOCKER_BUILD_SUMMARY: "false" # skip the docker/build-push-action job summary; Trivy publishes its own
      # Check vulnerabilities with Trivy — SARIF report (non-blocking, feeds the GitHub Security tab)
      - name: Trivy scan (SARIF)
        if: ${{ startsWith(inputs.CACHE_SUFFIX, 'arm') == false }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: local/${{ inputs.IMAGE }}
          scanners: vuln
          ignore-unfixed: true
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          skip-dirs: /root/.cargo
          trivyignores: .trivyignore
          ignore-policy: .trivyignore.rego # ignore Python (pkg:pypi/*) findings — tracked separately via pip/dependabot
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db
      - name: Upload Trivy SARIF report
        if: ${{ always() && startsWith(inputs.CACHE_SUFFIX, 'arm') == false }}
        continue-on-error: true # don't let a missing/partial SARIF mask the real scan error (the gate is the source of truth)
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.IMAGE }}-${{ inputs.ARCH }}
      # Hard gate — fail the build on ANY matching vulnerability
      - name: Trivy gate
        if: ${{ startsWith(inputs.CACHE_SUFFIX, 'arm') == false }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: local/${{ inputs.IMAGE }}
          scanners: vuln
          ignore-unfixed: true
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          skip-dirs: /root/.cargo
          trivyignores: .trivyignore
          ignore-policy: .trivyignore.rego # ignore Python (pkg:pypi/*) findings — tracked separately via pip/dependabot
          format: template
          template: "@.github/trivy/summary.tpl"
          output: trivy-summary.md
          exit-code: "1"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db
      # Publish the Trivy results to the GitHub Actions run summary
      - name: Trivy summary
        if: ${{ always() && startsWith(inputs.CACHE_SUFFIX, 'arm') == false }}
        run: |
          {
            echo "## Trivy — \`$IMAGE\` ($ARCH)"
            if [ -f trivy-summary.md ]; then cat trivy-summary.md; else echo "_No Trivy summary produced._"; fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          IMAGE: "${{ inputs.IMAGE }}"
          ARCH: "${{ inputs.ARCH }}"
      # Push image
      - name: Push image
        if: inputs.PUSH == true
        run: docker tag local/$IMAGE ghcr.io/bunkerity/$IMAGE-tests:$TAG && docker push ghcr.io/bunkerity/$IMAGE-tests:$TAG
        env:
          IMAGE: "${{ inputs.IMAGE }}"
          TAG: "${{ inputs.RELEASE }}"
