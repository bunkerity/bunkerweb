# BunkerWeb log rotation configuration for FreeBSD
# See newsyslog.conf(5) for details
#
# logfilename                                    [owner:group]   mode count size when  flags [/pid_file] [sig_num]

# Main service logs
/var/log/bunkerweb/access.log                    nginx:nginx     640  7     *    @T00  JC
/var/log/bunkerweb/error.log                     nginx:nginx     640  7     *    @T00  JC
/var/log/bunkerweb/modsec_audit.log              nginx:nginx     640  7     *    @T00  JC

# Component logs
/var/log/bunkerweb/scheduler.log                 nginx:nginx     640  7     *    @T00  JC
/var/log/bunkerweb/ui.log                        nginx:nginx     640  7     *    @T00  JC
/var/log/bunkerweb/ui-access.log                 nginx:nginx     640  7     *    @T00  JC
/var/log/bunkerweb/api.log                       nginx:nginx     640  7     *    @T00  JC
/var/log/bunkerweb/api-access.log                nginx:nginx     640  7     *    @T00  JC

# Let's Encrypt logs (certbot generates these with timestamps, keep for 7 days then delete)
/var/log/bunkerweb/letsencrypt/*.log             nginx:nginx     660  0     *    $D0   JBN
/var/log/bunkerweb/letsencrypt/*.log.[0-9]*      nginx:nginx     660  0     *    $D0   JBN
