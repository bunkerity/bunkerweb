ssl_certificate /var/cache/bunkerweb/misc/default-server-cert.pem;
ssl_certificate_key /var/cache/bunkerweb/misc/default-server-cert.key;
ssl_protocols {{ SSL_PROTOCOLS }};
{% if SSL_PROTOCOLS == "TLSv1.3" %}
ssl_prefer_server_ciphers off;
{% else %}
ssl_prefer_server_ciphers on;
{% endif %}
ssl_session_tickets off;
{% if "TLSv1.2" in SSL_PROTOCOLS or "TLSv1.1" in SSL_PROTOCOLS or "TLSv1" in SSL_PROTOCOLS %}
ssl_session_timeout 1d;
	{% if SSL_SESSION_CACHE_SIZE == "off" or SSL_SESSION_CACHE_SIZE == "none" %}
ssl_session_cache {{ SSL_SESSION_CACHE_SIZE }};
	{% else %}
ssl_session_cache shared:MozSSL:{{ SSL_SESSION_CACHE_SIZE }};
	{% endif %}
{% endif %}
ssl_ecdh_curve {{ resolve_ssl_ecdh_curve(SSL_ECDH_CURVE) }};
{% if "TLSv1.2" in SSL_PROTOCOLS +%}
ssl_dhparam /etc/nginx/dhparam;
	{% if SSL_CIPHERS_CUSTOM|default('')|trim != "" %}
ssl_ciphers {{ SSL_CIPHERS_CUSTOM }};
	{% else %}
		{% if SSL_CIPHERS_LEVEL == "old" %}
ssl_ciphers @SECLEVEL=0:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:DES-CBC3-SHA;
		{% elif SSL_CIPHERS_LEVEL == "intermediate" %}
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
		{% elif SSL_PROTOCOLS != "TLSv1.3" %}
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
		{% endif %}
	{% endif %}
{% endif %}

{% set https_ports = [] %}
{% for k, port in all.items() if k.startswith("HTTPS_PORT") and port %}
	{% if https_ports.append(port) %}{% endif %}
{% endfor %}
{% if https_ports|length > 0 %}
	{% if HTTP2 == "yes" %}
http2 on;
	{% endif %}
	{% set common_options = " ssl" %}
	{% if USE_PROXY_PROTOCOL == "yes" %}
		{% set common_options = common_options ~ " proxy_protocol" %}
	{% endif %}
	{% for port in https_ports %}
listen 0.0.0.0:{{ port }}{{ common_options }};
		{% if USE_IPV6 == "yes" %}
listen [::]:{{ port }}{{ common_options }};
		{% endif %}
	{% endfor %}
{% endif %}

{% if https_ports|length > 0 and "TLSv1.3" in SSL_PROTOCOLS and HTTP3 == "yes" and USE_PROXY_PROTOCOL == "no" %}
http3 on;
	{% set http3_listen_options = " quic" %}
	{% if MULTISITE == "no" and DISABLE_DEFAULT_SERVER == "no" and IS_LOADING == "no" %}
		{% set http3_listen_options = http3_listen_options ~ " reuseport" %}
	{% endif %}
	{% for port in https_ports %}
listen 0.0.0.0:{{ port }}{{ http3_listen_options }};
		{% if USE_IPV6 == "yes" %}
listen [::]:{{ port }}{{ http3_listen_options }};
		{% endif %}
	{% endfor %}
add_header Alt-Svc 'h3=":{{ HTTP3_ALT_SVC_PORT }}"; ma=86400';
{% endif %}

ssl_certificate_by_lua_block {
	local class         = require "middleclass"
	local clogger       = require "bunkerweb.logger"
	local helpers       = require "bunkerweb.helpers"
	local utils         = require "bunkerweb.utils"
	local cdatastore    = require "bunkerweb.datastore"
	local cjson         = require "cjson"
	local ssl           = require "ngx.ssl"
	local ocsp          = require "ngx.ocsp"

	local ngx = ngx
	local ngx_req = ngx.req
	local is_internal = ngx_req.is_internal
	local ERR = ngx.ERR
	local INFO = ngx.INFO
	local DEBUG = ngx.DEBUG
	local clear_certs = ssl.clear_certs
	local set_cert = ssl.set_cert
	local set_priv_key = ssl.set_priv_key
	local require_plugin = helpers.require_plugin
	local new_plugin = helpers.new_plugin
	local call_plugin = helpers.call_plugin
	local tostring      = tostring
	local insert        = table.insert
	local lower         = string.lower
	local match         = string.match
	local concat        = table.concat

	-- Try to load resty.openssl for native certificate parsing
	local resty_x509    = nil
	local has_resty_ssl = false
	pcall(function()
		resty_x509 = require "resty.openssl.x509"
		has_resty_ssl = true
	end)

	-- Start ssl_certificate phase
	local logger    = clogger:new("SSL-CERTIFICATE")
	local internalstore = cdatastore:new(ngx.shared.internalstore)
	logger:log(DEBUG, "ssl_certificate phase started")

	-- Get plugins order
	local order, err = internalstore:get("plugins_order", true)
	if not order then
		logger:log(ERR, "can't get plugins order from internalstore : " .. err)
		return
	end

	-- Resolve per-site plugin order
	local function get_phase_order(ord, phase, server_name)
		if ord.per_site and server_name and ord.per_site[server_name] and ord.per_site[server_name][phase] then
			return ord.per_site[server_name][phase]
		elseif ord.global and ord.global[phase] then
			return ord.global[phase]
		end
		return ord[phase]
	end

	local server_name = ssl.server_name()
	local phase_order = get_phase_order(order, "ssl_certificate", server_name)

	-- Helper: check if OCSP stapling is enabled for this site
	local function is_ocsp_stapling_enabled()
		-- Default to enabled (backward compatible behavior) if variables are not available
		local vars, err = internalstore:get("variables", true)
		if not vars then
			return true
		end

		-- Resolve effective SSL_USE_OCSP_STAPLING value with per-site override
		local value
		if vars.per_site and server_name and vars.per_site[server_name] then
			value = vars.per_site[server_name]["SSL_USE_OCSP_STAPLING"]
		end
		if value == nil and vars.global then
			value = vars.global["SSL_USE_OCSP_STAPLING"]
		end
		if value == nil then
			value = vars["SSL_USE_OCSP_STAPLING"]
		end

		-- If still nil, keep default behavior (enabled)
		if value == nil then
			return true
		end

		-- Normalize and interpret common falsy/disabled representations
		if type(value) == "boolean" then
			return value
		end
		local str = tostring(value):lower()
		if str == "0" or str == "false" or str == "off" or str == "no" then
			return false
		end

		-- Any other value is treated as enabled
		return true
	end

	-- Helper: sanitize domain/cert name for filesystem (replace * with _wildcard_)
	local function sanitize_name(name)
		if not name then return nil end
		return name:gsub("%*", "_wildcard_")
	end

	-- Helper: extract certificate serial number from PEM
	local function get_cert_serial(cert_pem)
		if not cert_pem or #cert_pem == 0 then
			return nil
		end

		-- Try native resty.openssl first (fast, no shell call)
		if has_resty_ssl then
			local cert, err = resty_x509.new(cert_pem)
			if cert then
				local serial_num = cert:get_serial_number()
				if serial_num then
					return tostring(serial_num)
				end
			else
				logger:log(DEBUG, "OCSP resty.openssl parse error: " .. tostring(err))
			end
		end

		-- Fallback to openssl command (slower, but more compatible)
		local tmp_cert = "/tmp/ocsp_cert_" .. ngx.var.connection .. ".pem"
		local f = io.open(tmp_cert, "w")
		if not f then
			return nil
		end
		f:write(cert_pem)
		f:close()

		local handle = io.popen("openssl x509 -serial -noout -in " .. tmp_cert .. " 2>/dev/null", "r")
		if not handle then
			os.remove(tmp_cert)
			return nil
		end

		local result = handle:read("*a")
		handle:close()
		os.remove(tmp_cert)

		local serial = result:match("serial=([A-F0-9]+)")
		return serial
	end

	-- Helper: extract certificate serial number from OCSP response DER
	local function get_ocsp_serial(ocsp_der)
		if not ocsp_der or #ocsp_der == 0 then
			return nil
		end

		-- Try native resty.openssl first (fast, direct DER parsing)
		if has_resty_ssl then
			local resty_ocsp = nil
			pcall(function()
				resty_ocsp = require "resty.openssl.ocsp"
			end)

			if resty_ocsp then
				local resp, err = resty_ocsp.new(ocsp_der)
				if resp then
					local serial_num = resp:get_serial()
					if serial_num then
						return tostring(serial_num)
					end
				else
					logger:log(DEBUG, "OCSP resty parsing error: " .. tostring(err))
				end
			end
		end

		-- Fallback: write to temp file and use openssl
		local tmp_ocsp = "/tmp/ocsp_resp_" .. ngx.var.connection .. ".der"
		local f = io.open(tmp_ocsp, "wb")
		if not f then
			return nil
		end
		f:write(ocsp_der)
		f:close()

		local handle = io.popen("openssl ocsp -respin " .. tmp_ocsp .. " -text -noout 2>/dev/null | grep 'Serial Number'", "r")
		if not handle then
			os.remove(tmp_ocsp)
			return nil
		end

		local result = handle:read("*a")
		handle:close()
		os.remove(tmp_ocsp)

		-- Parse "Serial Number: XXXXX" format
		local serial = result:match("Serial Number:%s*([A-F0-9]+)")
		return serial
	end

	-- Helper: verify OCSP response matches current certificate (by comparing serials)
	local function verify_ocsp_cert_match(cert_pem, ocsp_der)
		if not cert_pem or not ocsp_der then
			logger:log(DEBUG, "OCSP verification skipped (missing cert or OCSP data)")
			return true -- Allow OCSP if can't verify
		end

		-- Get serial from certificate
		local cert_serial = get_cert_serial(cert_pem)
		if not cert_serial then
			logger:log(DEBUG, "OCSP could not extract certificate serial")
			return false
		end

		-- Get serial from OCSP response (direct DER parsing - no files needed)
		local ocsp_serial = get_ocsp_serial(ocsp_der)
		if not ocsp_serial then
			logger:log(DEBUG, "OCSP could not extract OCSP response serial")
			return false
		end

		-- Compare serials
		if cert_serial == ocsp_serial then
			logger:log(DEBUG, "OCSP verified: certificate serial matches OCSP response serial: " .. cert_serial)
			return true
		else
			logger:log(DEBUG, "OCSP mismatch: cert serial=" .. cert_serial .. " vs ocsp serial=" .. ocsp_serial)
			return false
		end
	end

	-- Helper: set OCSP stapling from cache (internalstore + ocsp.der disk files)
	-- cert_pem: optional certificate PEM data for verification
	local function set_ocsp_from_cache(cert_pem)
		logger:log(DEBUG, "OCSP set_ocsp_from_cache() called for server_name=" .. (server_name or "nil"))

		if not is_ocsp_stapling_enabled() then
			logger:log(DEBUG, "OCSP stapling disabled via SSL_USE_OCSP_STAPLING setting")
			return
		end

		if not server_name or server_name == "" then
			logger:log(ERR, "OCSP no server_name available")
			return
		end

		local cache_key = "SSL:ocsp_status:" .. server_name
		local resp

		-- 1) Local shared dict lookup (per-worker cache)
		local db_val, gerr = internalstore:get(cache_key, true)
		if db_val then
			resp = db_val
		elseif gerr and gerr ~= "not found" then
			logger:log(ERR, "OCSP error while getting response from internalstore: " .. gerr)
		end

		-- 2) Fallback to on-disk OCSP response (/var/cache/bunkerweb/ssl/{domain}/ocsp.der)
		if not resp then
			local base_path = "/var/cache/bunkerweb/ssl/"
			
			-- Generate candidates for lookup
			local candidates = {}
			
			-- Direct matches
			insert(candidates, server_name)
			insert(candidates, server_name .. "-ecdsa")
			insert(candidates, server_name .. "-rsa")
			insert(candidates, "customcert-" .. server_name)
			insert(candidates, "customcert-" .. server_name .. "-ecdsa")
			insert(candidates, "customcert-" .. server_name .. "-rsa")
			
			-- Wildcard and apex matches (e.g., if server_name is www.example.com, try *.example.com and example.com)
			local labels = {}
			for label in server_name:gmatch("[^.]+") do
				insert(labels, label)
			end
			
			-- Only try wildcard/apex if we have at least subdomain.example.com (3+ labels), and avoid TLD-only suffixes
			if #labels >= 3 then
				for i = 2, #labels - 1 do
					local suffix = table.concat(labels, ".", i)
					if suffix and suffix ~= "" then
						-- Apex domain (e.g. example.com) — wildcard certs are often stored under apex name
						insert(candidates, suffix)
						insert(candidates, suffix .. "-ecdsa")
						insert(candidates, suffix .. "-rsa")
						insert(candidates, "customcert-" .. suffix)
						insert(candidates, "customcert-" .. suffix .. "-ecdsa")
						insert(candidates, "customcert-" .. suffix .. "-rsa")
						-- Wildcard form (e.g. *.example.com)
						local wildcard_base = "*." .. suffix
						insert(candidates, wildcard_base)
						insert(candidates, wildcard_base .. "-ecdsa")
						insert(candidates, wildcard_base .. "-rsa")
						insert(candidates, "customcert-" .. wildcard_base)
						insert(candidates, "customcert-" .. wildcard_base .. "-ecdsa")
						insert(candidates, "customcert-" .. wildcard_base .. "-rsa")
					end
				end
			end

			for _, name in ipairs(candidates) do
				if name and name ~= "" then
					local sanitized = sanitize_name(name)
					local path = base_path .. sanitized .. "/ocsp.der"
					local f, err = io.open(path, "rb")
					if f then
						local data = f:read("*a")
						f:close()
						if data and #data > 0 then
							-- Verify OCSP response matches current certificate
							-- Parse DER response directly to extract and compare serials
							local cert_matches = verify_ocsp_cert_match(cert_pem, data)

							if cert_matches then
								logger:log(DEBUG, "OCSP loaded response (" .. #data .. " bytes) from " .. path .. " (verified against certificate)")
								resp = data
								-- Cache in shared memory to avoid disk I/O on every handshake (TTL 300s)
								local ok_set, serr = internalstore:set(cache_key, resp, 300, true)
								if not ok_set then
									logger:log(ERR, "OCSP error while caching file response into internalstore: " .. (serr or "unknown"))
								end
								break
							else
								logger:log(DEBUG, "OCSP skipping response for " .. name .. " (certificate mismatch - certificate may have been updated)")
							end
						end
					else
						-- Log only on permission denied (avoid shell; use io.open error)
						if err and lower(err):find("permission denied", 1, true) then
							logger:log(ERR, "OCSP permission denied reading " .. path .. " (check file permissions)")
						end
					end
				end
			end
		end

		if not resp then
			logger:log(DEBUG, "OCSP not found for " .. server_name)
			return
		end

		-- Safely set OCSP stapling with exception handling
		local ok_pcall, ocsp_result = pcall(function()
			return ocsp.set_ocsp_status_resp(resp)
		end)

		if not ok_pcall then
			logger:log(ERR, "OCSP exception while setting stapling: " .. tostring(ocsp_result))
		else
			local ok_set, oerr = ocsp_result
			if not ok_set then
				logger:log(ERR, "OCSP failed to set stapling: " .. oerr)
			else
				logger:log(DEBUG, "OCSP stapling set from cache for " .. server_name)
			end
		end
	end

	-- Call ssl_certificate() methods
	logger:log(DEBUG, "calling ssl_certificate() methods of plugins ...")
	for i, plugin_id in ipairs(phase_order) do
		-- Require call
		local plugin_lua, err = require_plugin(plugin_id)
		if plugin_lua == false then
			logger:log(ERR, err)
		elseif plugin_lua == nil then
			logger:log(DEBUG, err)
		else
			-- Check if plugin has ssl_certificate method
			if plugin_lua.ssl_certificate ~= nil then
				-- New call
				local ok, plugin_obj = new_plugin(plugin_lua)
				if not ok then
					logger:log(ERR, plugin_obj)
				else
					local ok, ret = call_plugin(plugin_obj, "ssl_certificate")
					if not ok then
						logger:log(ERR, ret)
					elseif not ret.ret then
						logger:log(ERR, plugin_id .. ":ssl_certificate() call failed : " .. ret.msg)
					else
						logger:log(DEBUG, plugin_id .. ":ssl_certificate() call successful : " .. ret.msg)
						if ret.status then
							logger:log(DEBUG, plugin_id .. " is setting certificate/key : " .. ret.msg)
							local ok, err = clear_certs()
							if not ok then
								logger:log(ERR, "error while clearing certificates : " .. err)
							end
							ok, err = set_cert(ret.status[1])
							if not ok then
								logger:log(ERR, "error while setting certificate : " .. err)
							else
								local ok, err = set_priv_key(ret.status[2])
								if not ok then
									logger:log(ERR, "error while setting private key : " .. err)
								else
									-- Try to set OCSP stapling from cache (if enabled)
									-- Try to set OCSP stapling (certificate verification optional)
									logger:log(DEBUG, "About to call set_ocsp_from_cache() for " .. server_name)
									local ok_ocsp, ocsp_err = pcall(function()
										set_ocsp_from_cache()
									end)
									if not ok_ocsp then
										logger:log(ERR, "OCSP function error (certificate still set): " .. tostring(ocsp_err))
									end
									logger:log(DEBUG, "certificate set by " .. plugin_id)
									return true
								end
							end
						end
					end
				end
			else
				logger:log(DEBUG, "skipped execution of " .. plugin_id .. " because method ssl_certificate() is not defined")
			end
		end
	end
	logger:log(DEBUG, "called ssl_certificate() methods of plugins")

	logger:log(DEBUG, "ssl_certificate phase ended")

	return true
}
