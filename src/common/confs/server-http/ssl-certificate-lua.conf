ssl_certificate /var/cache/bunkerweb/misc/default-server-cert.pem;
ssl_certificate_key /var/cache/bunkerweb/misc/default-server-cert.key;
ssl_protocols {{ SSL_PROTOCOLS }};
{% if SSL_PROTOCOLS == "TLSv1.3" %}
ssl_prefer_server_ciphers off;
{% else %}
ssl_prefer_server_ciphers on;
{% endif %}
ssl_session_tickets off;
{% if "TLSv1.2" in SSL_PROTOCOLS or "TLSv1.1" in SSL_PROTOCOLS or "TLSv1" in SSL_PROTOCOLS %}
ssl_session_timeout 1d;
	{% if SSL_SESSION_CACHE_SIZE == "off" or SSL_SESSION_CACHE_SIZE == "none" %}
ssl_session_cache {{ SSL_SESSION_CACHE_SIZE }};
	{% else %}
ssl_session_cache shared:MozSSL:{{ SSL_SESSION_CACHE_SIZE }};
	{% endif %}
{% endif %}
ssl_ecdh_curve {{ resolve_ssl_ecdh_curve(SSL_ECDH_CURVE) }};
{% if "TLSv1.2" in SSL_PROTOCOLS +%}
ssl_dhparam /etc/nginx/dhparam;
	{% if SSL_CIPHERS_CUSTOM|default('')|trim != "" %}
ssl_ciphers {{ SSL_CIPHERS_CUSTOM }};
	{% else %}
		{% if SSL_CIPHERS_LEVEL == "old" %}
ssl_ciphers @SECLEVEL=0:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:DES-CBC3-SHA;
		{% elif SSL_CIPHERS_LEVEL == "intermediate" %}
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
		{% elif SSL_PROTOCOLS != "TLSv1.3" %}
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
		{% endif %}
	{% endif %}
{% endif %}

{% set https_ports = [] %}
{% for k, port in all.items() if k.startswith("HTTPS_PORT") and port %}
	{% if https_ports.append(port) %}{% endif %}
{% endfor %}
{% if https_ports|length > 0 %}
	{% if HTTP2 == "yes" %}
http2 on;
	{% endif %}
	{% set common_options = " ssl" %}
	{% if USE_PROXY_PROTOCOL == "yes" %}
		{% set common_options = common_options ~ " proxy_protocol" %}
	{% endif %}
	{% for port in https_ports %}
listen 0.0.0.0:{{ port }}{{ common_options }};
		{% if USE_IPV6 == "yes" %}
listen [::]:{{ port }}{{ common_options }};
		{% endif %}
	{% endfor %}
{% endif %}

{% if https_ports|length > 0 and "TLSv1.3" in SSL_PROTOCOLS and HTTP3 == "yes" and USE_PROXY_PROTOCOL == "no" %}
http3 on;
	{% set http3_listen_options = " quic" %}
	{% if MULTISITE == "no" and DISABLE_DEFAULT_SERVER == "no" and IS_LOADING == "no" %}
		{% set http3_listen_options = http3_listen_options ~ " reuseport" %}
	{% endif %}
	{% for port in https_ports %}
listen 0.0.0.0:{{ port }}{{ http3_listen_options }};
		{% if USE_IPV6 == "yes" %}
listen [::]:{{ port }}{{ http3_listen_options }};
		{% endif %}
	{% endfor %}
add_header Alt-Svc 'h3=":{{ HTTP3_ALT_SVC_PORT }}"; ma=86400';
{% endif %}

ssl_certificate_by_lua_block {
	-- Top-level pcall to ensure any unexpected Lua error does not abort the handshake
	local ok, err = pcall(function()
		-- 1. Load logger first (critical for diagnostics)
		local clogger
		local ok_logger, err_logger = pcall(function()
			return require "bunkerweb.logger"
		end)
		
		if not ok_logger then
			local err_msg = tostring(err_logger):sub(1, 1024)
			ngx.log(ngx.ERR, ("SSL-CERTIFICATE critical error: failed to load bunkerweb.logger: " .. err_msg):sub(1, 2048))
			return
		end
		clogger = err_logger
		local logger = clogger:new("SSL-CERTIFICATE")

		local function safe_log(level, msg)
			if msg then
				logger:log(level, tostring(msg):sub(1, 2048))
			end
		end

		safe_log(ngx.DEBUG, "bunkerweb.logger loaded successfully")

		-- 2. Load other core modules with logging
		local function safe_require(name)
			local ok_mod, mod = pcall(require, name)
			if ok_mod then
				safe_log(ngx.DEBUG, "Module " .. name .. " loaded successfully")
				return mod
			else
				safe_log(ngx.ERR, "Failed to load core module " .. name .. ": " .. tostring(mod))
				return nil
			end
		end

		local class      = safe_require "middleclass"
		local helpers    = safe_require "bunkerweb.helpers"
		local utils      = safe_require "bunkerweb.utils"
		local cdatastore = safe_require "bunkerweb.datastore"
		local cjson      = safe_require "cjson"
		local ssl        = safe_require "ngx.ssl"

		-- Check critical modules (ssl, helpers, cdatastore are essential)
		if not ssl then
			safe_log(ngx.ERR, "Critical module ngx.ssl failed to load - cannot set custom certificates, nginx will use default certificate")
			return  -- Let nginx use default certificate configured in http block
		end

		if not helpers then
			safe_log(ngx.ERR, "Critical module bunkerweb.helpers failed to load - plugins cannot be loaded, nginx will use default certificate")
			return  -- Let nginx use default certificate
		end

		if not cdatastore then
			safe_log(ngx.ERR, "Critical module bunkerweb.datastore failed to load - cannot access configuration, nginx will use default certificate")
			return  -- Let nginx use default certificate
		end

		-- Log non-critical module failures but continue
		if not class then
			safe_log(ngx.ERR, "Non-critical module middleclass failed to load - some features may not work")
		end
		if not utils then
			safe_log(ngx.ERR, "Non-critical module bunkerweb.utils failed to load - some features may not work")
		end
		if not cjson then
			safe_log(ngx.ERR, "Non-critical module cjson failed to load - JSON operations may not work")
		end

		local ngx           = ngx
		local ngx_req       = ngx.req
		local is_internal   = ngx_req.is_internal
		local ERR           = ngx.ERR
		local INFO          = ngx.INFO
		local NOTICE        = ngx.NOTICE
		local DEBUG         = ngx.DEBUG

		-- 3. Optional modules (require with pcall for safety)
		local function optional_require(name, report_error)
			local ok_mod, mod = pcall(require, name)
			if ok_mod then
				safe_log(DEBUG, "Optional module " .. name .. " loaded successfully")
				return mod
			else
				local log_level = report_error and ERR or DEBUG
				safe_log(log_level, "Optional module " .. name .. " not found or failed to load: " .. tostring(mod))
				return nil
			end
		end

		-- OCSP module.
		-- Debug toggle: disable ngx.ocsp on purpose to simulate a failure.
		-- Default: enabled (unless BW_DISABLE_NGX_OCSP is explicitly set).
		local disable_ngx_ocsp = false
		pcall(function()
			local v = os.getenv("BW_DISABLE_NGX_OCSP")
			if v then
				v = tostring(v):lower()
				if v == "1" or v == "yes" or v == "true" then
					disable_ngx_ocsp = true
				elseif v == "0" or v == "no" or v == "false" then
					disable_ngx_ocsp = false
				end
			end
		end)

		local ocsp = nil
		if not disable_ngx_ocsp then
			ocsp = optional_require("ngx.ocsp", true)  -- Report failure (OCSP stapling feature)
		else
			safe_log(DEBUG, "OCSP DISABLED: ngx.ocsp disabled via BW_DISABLE_NGX_OCSP")
		end
		local cclusterstore = optional_require("bunkerweb.clusterstore", false)  -- Silent failure (cache optimization)

		-- Try to load resty.openssl for native certificate parsing (report failure - performance optimization).
		-- Debug toggles:
		-- - disable resty.openssl to force OpenSSL CLI fallbacks via `BW_DISABLE_RESTY_OPENSSL=yes|1|true`
		-- - enable resty.openssl via `BW_ENABLE_RESTY_OPENSSL=yes|1|true`
		-- Default: enabled (resty.openssl will be loaded).
		local disable_resty_openssl = false
		pcall(function()
			local v_disable = os.getenv("BW_DISABLE_RESTY_OPENSSL")
			if v_disable then
				v_disable = tostring(v_disable):lower()
				if v_disable == "1" or v_disable == "yes" or v_disable == "true" then
					disable_resty_openssl = true
				end
			end

			local v_enable = os.getenv("BW_ENABLE_RESTY_OPENSSL")
			if v_enable then
				v_enable = tostring(v_enable):lower()
				if v_enable == "1" or v_enable == "yes" or v_enable == "true" then
					disable_resty_openssl = false
				end
			end
		end)

		local resty_x509 = nil
		if not disable_resty_openssl then
			resty_x509 = optional_require("resty.openssl.x509", true)
		else
			safe_log(DEBUG, "RESTY.OPENSSL DISABLED: resty.openssl.x509 is disabled; using OpenSSL CLI fallbacks")
		end
		local has_resty_ssl = (resty_x509 ~= nil) and not disable_resty_openssl

		local clear_certs    = ssl and ssl.clear_certs
		local set_cert       = ssl and ssl.set_cert
		local set_priv_key   = ssl and ssl.set_priv_key
		local require_plugin = helpers and helpers.require_plugin
		local new_plugin     = helpers and helpers.new_plugin
		local call_plugin    = helpers and helpers.call_plugin
		
		local tostring       = tostring
		local insert         = table.insert
		local lower          = string.lower
		-- Convert binary data to lowercase hex (replacement for ngx.encode_base16)
		local function to_hex(bin)
			if not bin then
				return nil
			end
			local t = {}
			for i = 1, #bin do
				t[i] = string.format("%02x", string.byte(bin, i))
			end
			return table.concat(t)
		end
		local match          = string.match
		local concat         = table.concat

		-- Lua pattern note: `string.match()` uses Lua patterns, not regex.
		-- So we validate fingerprints with length + allowed-characters checks.
		local function is_fp64_lower_hex(fp)
			return type(fp) == "string" and #fp == 64 and fp:match("^[0-9a-f]+$") ~= nil
		end

		-- Helper: parse multiple PEM certificates from a single string
		-- Returns array of individual PEM certificate strings
		local function parse_pem_certificates(pem_data)
			if not pem_data or #pem_data == 0 then
				return {}
			end

			local certs = {}
			local current_cert = nil

			for line in pem_data:gmatch("[^\n]+") do
				if current_cert then
					current_cert = current_cert .. "\n" .. line
				end

				if line:find("-----BEGIN CERTIFICATE-----", 1, true) then
					current_cert = line
				elseif line:find("-----END CERTIFICATE-----", 1, true) then
					if current_cert then
						insert(certs, current_cert)
						current_cert = nil
					end
				end
			end

			return certs
		end

		-- Helper: parse multiple PEM private keys from a single string
		-- Returns array of individual PEM key strings
		-- Matches RSA, EC, EdDSA, and other key types
		local function parse_pem_keys(pem_data)
			if not pem_data or #pem_data == 0 then
				return {}
			end

			local keys = {}
			local current_key = nil
			local in_key = false

			for line in pem_data:gmatch("[^\n]+") do
				if line:find("-----BEGIN", 1, true) and line:find("PRIVATE KEY", 1, true) then
					in_key = true
					current_key = line
				elseif in_key and current_key then
					current_key = current_key .. "\n" .. line
					if line:find("-----END", 1, true) and line:find("PRIVATE KEY", 1, true) then
						insert(keys, current_key)
						current_key = nil
						in_key = false
					end
				end
			end

			return keys
		end

				-- Helper: extract certificate serial number for identification (normalized to uppercase)
		local function get_cert_identifier(cert_pem)
			if not cert_pem or #cert_pem == 0 then
				return nil
			end

			-- Try resty.openssl first (fast)
			if has_resty_ssl then
				local rest_err = nil
				local ok_id, rest_identifier = pcall(function()
					local cert, err = resty_x509.new(cert_pem)
					rest_err = err
					if cert then
						local serial = cert:get_serial_number()
						if serial then
							return tostring(serial):upper()
						end
					end
					return nil
				end)

				if ok_id and rest_identifier then
					return rest_identifier
				end
				safe_log(
					DEBUG,
					"OCSP get_cert_identifier resty.openssl could not extract serial; falling back to openssl server_name=" ..
						(server_name or "nil")
				)
				if rest_err then
					safe_log(DEBUG, "OCSP get_cert_identifier resty.openssl error: " .. tostring(rest_err))
				end
			end

			-- Fallback: extract via openssl command
			safe_log(DEBUG, "OCSP get_cert_identifier falling back to openssl server_name=" .. (server_name or "nil"))
			local identifier = nil
			pcall(function()
				local worker_id = ngx.worker.id() or "0"
				local tmp_cert = "/tmp/pair_cert_w" .. worker_id .. "_c" .. ngx.var.connection .. ".pem"
				local f = io.open(tmp_cert, "w")
				if not f then return end

				f:write(cert_pem)
				f:close()

				local handle = io.popen("openssl x509 -serial -noout -in " .. tmp_cert .. " 2>/dev/null", "r")
				if handle then
					local result = handle:read("*a")
					handle:close()
					if result then
						local serial = result:match("serial=([A-Fa-f0-9]+)")
						if serial then
							identifier = serial:upper()
						end
					end
				end

				pcall(function() os.remove(tmp_cert) end)
			end)

			return identifier
		end

		-- Helper: extract public key fingerprint (SHA256) from certificate or private key PEM string
		-- Uses native lua-resty-openssl for zero-shell-overhead fingerprinting
		-- IMPORTANT: Only accepts PEM/DER strings. Do NOT pass cdata pointers from ngx.ssl.parse_pem_cert()
		-- as they are STACK_OF(X509)* — casting to X509* and calling resty.openssl causes a C-level segfault.
		local function get_pubkey_fingerprint(cert_data, is_key)
			if not cert_data then
				return nil
			end
			if type(cert_data) ~= "string" then
				safe_log(DEBUG, "OCSP get_pubkey_fingerprint: rejecting non-string input (type=" .. type(cert_data) .. ") to prevent segfault")
				return nil
			end
			if #cert_data == 0 then
				return nil
			end

			local fingerprint = nil
			local ok_rest, rest_err = pcall(function()
				local x509 = require("resty.openssl.x509")
				local pkey = require("resty.openssl.pkey")
				local digest_lib = require("resty.openssl.digest")

				if is_key then
					-- Load as private key (auto-detects PEM/DER)
					local key_obj = pkey.new(cert_data)
					if not key_obj then
						safe_log(DEBUG, "OCSP failed to load private key for fingerprinting")
						return
					end
					-- Export public key to DER format
					local pubkey_der, err = key_obj:tostring(false, 'DER')  -- false = public key only
					if not pubkey_der then
						safe_log(DEBUG, "OCSP failed to export public key to DER: " .. (err or "unknown"))
						return
					end
					-- Compute SHA256 of the public key DER
					local digest_ctx = digest_lib.new('sha256')
					if digest_ctx then
						digest_ctx:update(pubkey_der)
						fingerprint = to_hex(digest_ctx:final()):lower()
					end
				else
					-- Load as certificate (auto-detects PEM/DER)
					local cert_obj = x509.new(cert_data)
					if not cert_obj then
						safe_log(DEBUG, "OCSP failed to load certificate for fingerprinting")
						return
					end

					-- Compute SHA256 of public key SubjectPublicKeyInfo DER (matches ocsp-refresh.py).
					-- `cert_obj:pubkey_digest()` has shown mismatches vs the Python implementation.
					-- So we export the pubkey in DER and hash it ourselves.
					local digest_ctx = digest_lib.new('sha256')
					if digest_ctx then
						local pub = nil
						local ok_pub, pub_err = pcall(function()
							-- resty.openssl.x509 exposes get_pubkey(), which returns a pkey object.
							pub = cert_obj:get_pubkey()
						end)
						if not ok_pub then
							safe_log(DEBUG, "OCSP export pubkey: cert_obj:get_pubkey() failed: " .. tostring(pub_err))
						end
						if pub then
							local pubkey_der, err = pub:tostring("public", "DER")
							if pubkey_der then
								safe_log(DEBUG, "OCSP export pubkey SPKI DER ok (len=" .. tostring(#pubkey_der) .. ")")
								digest_ctx:update(pubkey_der)
								fingerprint = to_hex(digest_ctx:final()):lower()
							else
								safe_log(DEBUG, "OCSP failed to export cert pubkey SPKI DER: " .. (err or "unknown"))
							end
						else
							safe_log(DEBUG, "OCSP export pubkey: cert_obj:get_pubkey() returned nil")
						end
					end

					-- Fallback (previous behavior) if export+hash failed
					if not fingerprint then
						safe_log(DEBUG, "OCSP export+hash SPKI DER failed; falling back to cert_obj:pubkey_digest('sha256')")
						local digest_bytes, err = cert_obj:pubkey_digest('sha256')
						if digest_bytes then
							fingerprint = to_hex(digest_bytes):lower()
						else
							safe_log(DEBUG, "OCSP pubkey_digest failed: " .. (err or "unknown"))
						end
					end
				end
			end)
			if not ok_rest then
				safe_log(DEBUG, "OCSP get_pubkey_fingerprint resty.openssl error: " .. tostring(rest_err))
			end

			-- Fallback to OpenSSL if lua-resty-openssl fingerprinting failed.
			-- This is slower and should normally not be needed, but it prevents silent OCSP failures.
			if not fingerprint then
				safe_log(DEBUG, "OCSP get_pubkey_fingerprint falling back to openssl server_name=" .. (server_name or "nil"))
				pcall(function()
					local worker_id = ngx.worker.id() or "0"
					local tmp_cert = "/tmp/ocsp_pubkey_fp_w" .. worker_id .. "_c" .. ngx.var.connection .. ".pem"
					local f = io.open(tmp_cert, "w")
					if not f then
						return
					end
					f:write(cert_data)
					f:close()

					-- Compute SHA256 over SubjectPublicKeyInfo DER (matches ocsp-refresh.py logic)
					-- Output example: "SHA2-256(stdin)= <hex>"
					local cmd = "openssl x509 -pubkey -noout -in " .. tmp_cert .. " 2>/dev/null"
						.. " | openssl pkey -pubin -outform DER 2>/dev/null"
						.. " | openssl dgst -sha256 2>/dev/null"
					local handle = io.popen(cmd, "r")
					if not handle then
						pcall(function() os.remove(tmp_cert) end)
						return
					end

					local out = handle:read("*a")
					handle:close()
					pcall(function() os.remove(tmp_cert) end)

					if out then
						local fp = out:match("=\\s*([0-9A-Fa-f]{64})")
						if fp then
							fingerprint = lower(fp)
						end
					end
				end)
			end

			return fingerprint
		end

		-- OCSP uses the fingerprint to locate /var/cache/bunkerweb/ssl/{hex1}/{hex2}/{fingerprint}/ocsp.der.
		-- The Python job (`ocsp-refresh.py`) computes this fingerprint by hashing the public key
		-- in SubjectPublicKeyInfo DER.
		--
		-- `resty.openssl` may produce a different hash for the "cert_obj:pubkey_digest(sha256)" path
		-- depending on OpenSSL bindings/encoding.
		--
		-- To guarantee cache hits, we remap the "resty fingerprint" to the "OpenSSL/Python-compatible"
		-- fingerprint once, and then reuse that mapping from `internalstore`.
		local function get_ocsp_pubkey_fingerprint(cert_pem)
			local resty_fp = get_pubkey_fingerprint(cert_pem, false)
			if not resty_fp then
				return nil
			end
			if not is_fp64_lower_hex(resty_fp) then
				return resty_fp
			end

			local map_key = "TLS:SSL:ocsp_fp_map:" .. resty_fp
			local ok_map, mapped = pcall(function()
				return internalstore:get(map_key, true)
			end)
			if ok_map and is_fp64_lower_hex(mapped) then
				return mapped
			end

			-- Compute OpenSSL/Python-compatible fingerprint and cache mapping.
			local fingerprint_openssl = nil
			pcall(function()
				safe_log(DEBUG, "OCSP get_ocsp_pubkey_fingerprint computing openssl remap server_name=" .. (server_name or "nil"))
				local worker_id = ngx.worker.id() or "0"
				local tmp_cert = "/tmp/ocsp_pubkey_fp_w" .. worker_id .. "_c" .. ngx.var.connection .. ".pem"
				local f = io.open(tmp_cert, "w")
				if not f then
					return
				end
				f:write(cert_pem)
				f:close()

				-- Capture stderr in output to help debugging.
				local cmd = "openssl x509 -pubkey -noout -in " .. tmp_cert .. " 2>&1"
					.. " | openssl pkey -pubin -outform DER 2>/dev/null"
					.. " | openssl dgst -sha256 2>/dev/null"
				local handle = io.popen(cmd, "r")
				if not handle then
					return
				end
				local out = handle:read("*a")
				handle:close()
				pcall(function() os.remove(tmp_cert) end)

				if out then
					local fp = out:match("=\\s*([0-9A-Fa-f]{64})")
					if fp then
						fingerprint_openssl = lower(fp)
					end
					if not fingerprint_openssl then
						safe_log(DEBUG, "OCSP OpenSSL fingerprint parse failed; openssl_out=" .. tostring(out):sub(1, 120))
					end
				end
			end)

			if is_fp64_lower_hex(fingerprint_openssl) then
				safe_log(DEBUG, "OCSP get_ocsp_pubkey_fingerprint resty=" .. resty_fp:sub(1, 16) .. "... openssl=" .. fingerprint_openssl:sub(1, 16) .. "...")
				pcall(function()
					internalstore:set(map_key, fingerprint_openssl, 86400, true) -- 24h mapping cache
				end)
				return fingerprint_openssl
			end

			safe_log(DEBUG, "OCSP get_ocsp_pubkey_fingerprint openssl_fp=nil (resty=" .. resty_fp:sub(1, 16) .. "...)")
			return resty_fp
		end

		-- Helper: pair certificates with their corresponding keys by matching public key fingerprints
		-- Returns array of {cert = "...", key = "...", cert_id = "...", matched = true/false} tables
		local function pair_certs_and_keys(certs, keys)
			local pairs = {}
			local num_certs = #certs
			local num_keys = #keys

			safe_log(DEBUG, "Matching " .. num_certs .. " certificate(s) with " .. num_keys .. " key(s) by public key fingerprint")

			-- Compute fingerprints for all keys (expensive, do once)
			local key_fingerprints = {}
			for i, key in ipairs(keys) do
				local fp = get_pubkey_fingerprint(key, true)  -- is_key = true
				key_fingerprints[i] = fp
				if fp then
					safe_log(DEBUG, "Key #" .. i .. " fingerprint: " .. fp:sub(1, 16) .. "...")
				else
					safe_log(NOTICE, "Could not extract fingerprint from key #" .. i)
				end
			end

			-- Try to match each certificate with a key
			for cert_idx, cert_pem in ipairs(certs) do
				local cert_id = get_cert_identifier(cert_pem) or ("cert_" .. cert_idx)
				local cert_fp = get_pubkey_fingerprint(cert_pem, false)  -- is_key = false

				if not cert_fp then
					safe_log(NOTICE, "Certificate #" .. cert_idx .. " (" .. cert_id .. "): could not extract public key fingerprint - skipping")
					insert(pairs, {
						cert = cert_pem,
						key = nil,
						cert_id = cert_id,
						matched = false
					})
				else
					safe_log(DEBUG, "Certificate #" .. cert_idx .. " (" .. cert_id .. ") fingerprint: " .. cert_fp:sub(1, 16) .. "...")

					-- Find matching key by fingerprint
					local matched_key = nil
					local matched_key_idx = nil

					for key_idx, key_fp in ipairs(key_fingerprints) do
						if key_fp and cert_fp == key_fp then
							matched_key = keys[key_idx]
							matched_key_idx = key_idx
							break
						end
					end

					if matched_key then
						safe_log(INFO, "Certificate #" .. cert_idx .. " (" .. cert_id .. ") matched with key #" .. matched_key_idx)
						insert(pairs, {
							cert = cert_pem,
							key = matched_key,
							cert_id = cert_id,
							matched = true
						})
					else
						safe_log(NOTICE, "Certificate #" .. cert_idx .. " (" .. cert_id .. ") has no matching key - will attempt to use without key")
						insert(pairs, {
							cert = cert_pem,
							key = nil,
							cert_id = cert_id,
							matched = false
						})
					end
				end
			end

			-- Warn about unused keys
			local keys_used = {}
			for _, pair in ipairs(pairs) do
				if pair.matched then
					for key_idx, key in ipairs(keys) do
						if key == pair.key then
							keys_used[key_idx] = true
							break
						end
					end
				end
			end

			for key_idx = 1, num_keys do
				if not keys_used[key_idx] then
					safe_log(NOTICE, "Key #" .. key_idx .. " was not matched to any certificate")
				end
			end

			return pairs
		end

		-- Start ssl_certificate phase
		local internalstore = cdatastore and cdatastore:new(ngx.shared.internalstore)
		if not internalstore then
			safe_log(ERR, "Failed to initialize internalstore")
			return
		end

		-- Get plugins order
		local order, err = internalstore:get("plugins_order", true)
		if not order then
			safe_log(ERR, "cannot get plugins order from internalstore : " .. (err or "unknown"))
			return
		end

		-- Resolve per-site plugin order
		local function get_phase_order(ord, phase, server_name)
			if ord.per_site and server_name and ord.per_site[server_name] and ord.per_site[server_name][phase] then
				return ord.per_site[server_name][phase]
			elseif ord.global and ord.global[phase] then
				return ord.global[phase]
			end
			return ord[phase]
		end

		local server_name = ssl and ssl.server_name()
		local phase_order = get_phase_order(order, "ssl_certificate", server_name)

		safe_log(INFO, "ssl_certificate phase started for server_name=" .. (server_name or "nil"))

		-- Helper: check if Redis is enabled globally (with exception handling)
		local function is_redis_enabled()
			-- Get variables with exception handling
			local ok_get, get_result = pcall(function()
				return internalstore:get("variables", true)
			end)

			if not ok_get then
				safe_log(DEBUG, "Redis enabled check: exception reading variables: " .. tostring(get_result))
				return false  -- Fail safely to disabled
			end

			local vars, err = get_result, nil
			if not vars or not vars.global then
				return false  -- Default to disabled if not configured
			end

			local value = vars.global["USE_REDIS"]
			if value == nil then
				return false
			end

			-- Normalize and interpret common truthy representations
			if type(value) == "boolean" then
				return value
			end
			local str = tostring(value):lower()
			return str == "1" or str == "true" or str == "on" or str == "yes"
		end

		-- Helper: check if OCSP stapling is enabled for this site (with exception handling)
		local function is_ocsp_stapling_enabled()
			-- Get variables with exception handling
			local ok_get, get_result = pcall(function()
				return internalstore:get("variables", true)
			end)

			if not ok_get then
				safe_log(DEBUG, "OCSP stapling enabled check: exception reading variables: " .. tostring(get_result))
				return true  -- Fail safely to enabled (backward compatible)
			end

			local vars = get_result
			if not vars then
				return true  -- Default to enabled if not available
			end

			-- Resolve effective SSL_USE_OCSP_STAPLING value with per-site override
			local value
			if vars.per_site and server_name and vars.per_site[server_name] then
				value = vars.per_site[server_name]["SSL_USE_OCSP_STAPLING"]
			end
			if value == nil and vars.global then
				value = vars.global["SSL_USE_OCSP_STAPLING"]
			end
			if value == nil then
				value = vars["SSL_USE_OCSP_STAPLING"]
			end

			-- If still nil, keep default behavior (enabled)
			if value == nil then
				return true
			end

			-- Normalize and interpret common falsy/disabled representations
			if type(value) == "boolean" then
				return value
			end
			local str = tostring(value):lower()
			if str == "0" or str == "false" or str == "off" or str == "no" then
				return false
			end

			-- Any other value is treated as enabled
			return true
		end

		-- Helper: cleanup old temp files from /tmp (older than 5 minutes)
		local function cleanup_temp_files()
			pcall(function()
				-- Safely execute find to delete old ocsp related temp files
				-- Pattern matches files created by this script: ocsp_cert_*, ocsp_resp_*, ocsp_must_staple_*
				os.execute("find /tmp -name 'ocsp_*' -mmin +5 -delete 2>/dev/null")
			end)
		end

		-- Helper: sanitize domain/cert name for filesystem (replace * with _wildcard_)
		local function sanitize_name(name)
			if not name then return nil end
			return name:gsub("%*", "_wildcard_")
		end

		-- Helper: extract certificate serial number from PEM
		local function get_cert_serial(cert_pem)
			if not cert_pem or #cert_pem == 0 then
				return nil
			end

			-- Try native resty.openssl (fast, no shell call)
			if has_resty_ssl then
				local cert, err = resty_x509.new(cert_pem)
				if cert then
					local serial_num = cert:get_serial_number()
					if serial_num then
						return tostring(serial_num)
					end
					safe_log(DEBUG, "OCSP get_cert_serial resty.openssl returned cert but no serial; falling back to openssl server_name=" .. (server_name or "nil"))
				else
					safe_log(DEBUG, "OCSP get_cert_serial resty.openssl parse error; falling back to openssl server_name=" .. (server_name or "nil"))
					safe_log(DEBUG, "OCSP resty.openssl error: " .. tostring(err))
				end
			end

			-- Fallback to openssl command (slower, but more compatible) - wrap in pcall to avoid block crash
			safe_log(DEBUG, "OCSP get_cert_serial falling back to openssl server_name=" .. (server_name or "nil"))
			local serial = nil
			pcall(function()
				local worker_id = ngx.worker.id() or "0"
				local tmp_cert = "/tmp/ocsp_cert_w" .. worker_id .. "_c" .. ngx.var.connection .. ".pem"
				local f = io.open(tmp_cert, "w")
				if not f then
					safe_log(ERR, "OCSP cert serial: could not open temp file for writing: " .. tmp_cert)
					return
				end

				-- Write with error checking
				local ok_write, write_err = f:write(cert_pem)
				f:close()
				if not ok_write then
					safe_log(ERR, "OCSP cert serial: write failed: " .. (write_err or "unknown"))
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				-- Run openssl command and ensure cleanup on all paths
				local handle = io.popen("openssl x509 -serial -noout -in " .. tmp_cert .. " 2>/dev/null", "r")
				if not handle then
					safe_log(DEBUG, "OCSP cert serial: openssl command failed")
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				local result = handle:read("*a")
				handle:close()
				pcall(function() os.remove(tmp_cert) end)

				if not result or #result == 0 then
					safe_log(DEBUG, "OCSP cert serial: openssl returned no output")
					return
				end

				serial = result:match("serial=([A-F0-9]+)")
				if not serial then
					safe_log(DEBUG, "OCSP cert serial: could not parse serial from output: " .. result)
				end
			end)

			return serial
		end

		-- Helper: extract certificate serial number from OCSP response DER
		local function get_ocsp_serial(ocsp_der)
			if not ocsp_der or #ocsp_der == 0 then
				return nil
			end

			-- Try native resty.openssl first (fast, direct DER parsing)
			if has_resty_ssl then
				local resty_ocsp = nil
				pcall(function()
					resty_ocsp = require "resty.openssl.ocsp"
				end)

				if resty_ocsp then
					local resp, err = resty_ocsp.new(ocsp_der)
					if resp then
						local serial_num = resp:get_serial()
						if serial_num then
							return tostring(serial_num)
						end
					else
						safe_log(DEBUG, "OCSP resty parsing error: " .. tostring(err))
					end
				end
			end

			safe_log(DEBUG, "OCSP get_ocsp_serial resty could not extract serial; falling back to openssl server_name=" .. (server_name or "nil"))
			-- Fallback: use openssl command (wrap in pcall for safety)
			safe_log(DEBUG, "OCSP get_ocsp_serial falling back to openssl ocsp -respin server_name=" .. (server_name or "nil"))
			local serial = nil
			pcall(function()
				local worker_id = ngx.worker.id() or "0"
				local tmp_ocsp = "/tmp/ocsp_resp_w" .. worker_id .. "_c" .. ngx.var.connection .. ".der"
				local f = io.open(tmp_ocsp, "wb")
				if not f then
					safe_log(ERR, "OCSP serial: could not open temp file for writing: " .. tmp_ocsp)
					return
				end

				-- Write with error checking
				local ok_write, write_err = f:write(ocsp_der)
				f:close()
				if not ok_write then
					safe_log(ERR, "OCSP serial: write failed: " .. (write_err or "unknown"))
					pcall(function() os.remove(tmp_ocsp) end)
					return
				end

				-- Run openssl command and ensure cleanup on all paths
				local handle = io.popen("openssl ocsp -respin " .. tmp_ocsp .. " -text -noout 2>/dev/null | grep 'Serial Number'", "r")
				if not handle then
					safe_log(DEBUG, "OCSP serial: openssl command failed")
					pcall(function() os.remove(tmp_ocsp) end)
					return
				end

				local result = handle:read("*a")
				handle:close()
				pcall(function() os.remove(tmp_ocsp) end)

				if not result or #result == 0 then
					safe_log(DEBUG, "OCSP serial: openssl returned no output")
					return
				end

				-- Parse "Serial Number: XXXXX" format
				serial = result:match("Serial Number:%s*([A-F0-9]+)")
				if not serial then
					safe_log(DEBUG, "OCSP serial: could not parse serial from output: " .. result)
				end
			end)

			return serial
		end

		-- Helper: verify OCSP response matches current certificate (by comparing serials)
		local function verify_ocsp_cert_match(cert_pem, ocsp_der)
			if not cert_pem or not ocsp_der then
				safe_log(DEBUG, "OCSP verification skipped (missing cert or OCSP data)")
				return true -- Allow OCSP if cannot verify
			end

			-- If cert_pem is not a PEM string (e.g., parsed object from ssl.parse_pem_cert), we cannot re-verify it here
			-- OCSP responses are pre-verified and written by ocsp-refresh.py, so in this runtime path we trust the cached response
			if type(cert_pem) ~= "string" then
				safe_log(DEBUG, "OCSP verification skipped in ssl_certificate phase because certificate is not a PEM string (parsed object from ngx.ssl); using pre-validated cached OCSP response from ocsp-refresh job")
				return true
			end


			-- Get serial from certificate
			local cert_serial = get_cert_serial(cert_pem)
			if not cert_serial then
				safe_log(DEBUG, "OCSP could not extract certificate serial")
				return false
			end

			-- Get serial from OCSP response (direct DER parsing - no files needed)
			local ocsp_serial = get_ocsp_serial(ocsp_der)
			if not ocsp_serial then
				safe_log(DEBUG, "OCSP could not extract OCSP response serial")
				return false
			end

			-- Compare serials (uppercase for consistent comparison)
			local cert_serial_upper = cert_serial:upper()
			local ocsp_serial_upper = ocsp_serial:upper()
			if cert_serial_upper == ocsp_serial_upper then
				safe_log(DEBUG, "OCSP verified: certificate serial matches OCSP response serial: " .. cert_serial_upper)
				return true
			else
				safe_log(DEBUG, "OCSP mismatch: cert serial=" .. cert_serial_upper .. " vs ocsp serial=" .. ocsp_serial_upper)
				return false
			end
		end

		-- Helper: fast validation using cached metadata fingerprint
		-- This avoids parsing OCSP DER (openssl/resty) just to detect corrupted/incorrect cached responses.
		-- Returns:
		-- - true if fingerprint matches or metadata is missing
		-- - false if fingerprint explicitly mismatches
		local function verify_ocsp_fingerprint_match(expected_cert_fp, ocsp_dir)
			if not expected_cert_fp or not ocsp_dir then
				return true
			end

			local meta_path = ocsp_dir .. "/ocsp.json"
			local meta_raw = nil
			pcall(function()
				local fmeta = io.open(meta_path, "r")
				if fmeta then
					meta_raw = fmeta:read("*a")
					fmeta:close()
				end
			end)

			if not meta_raw or #meta_raw == 0 then
				safe_log(DEBUG, "OCSP fingerprint verify skipped (missing ocsp.json) expected_fp=" .. tostring(expected_cert_fp) .. " server_name=" .. (server_name or "nil"))
				return true
			end

			local ok_decode, decoded = pcall(cjson.decode, meta_raw)
			if not ok_decode or type(decoded) ~= "table" then
				safe_log(DEBUG, "OCSP fingerprint verify skipped (invalid ocsp.json) expected_fp=" .. tostring(expected_cert_fp) .. " server_name=" .. (server_name or "nil"))
				return true
			end

			local meta_fp = decoded.fingerprint
			if type(meta_fp) ~= "string" then
				safe_log(DEBUG, "OCSP fingerprint verify skipped (missing fingerprint in ocsp.json) expected_fp=" .. tostring(expected_cert_fp) .. " server_name=" .. (server_name or "nil"))
				return true
			end

			meta_fp = meta_fp:lower()
			if meta_fp == expected_cert_fp then
				return true
			end

			safe_log(
				ERR,
				"OCSP fingerprint mismatch: meta_fp=" .. meta_fp .. " expected_fp=" .. tostring(expected_cert_fp) ..
					" ocsp_dir=" .. ocsp_dir .. " server_name=" .. (server_name or "nil")
			)
			return false
		end

		-- Helper: read and parse certificate once, extract Must-Staple + responder URL
		-- Input: cert_pem - certificate in PEM format (passed from plugin, NOT read via ssl.cert_pem())
		-- Returns: { cert_parsed = resty cert object or nil, must_staple = bool, responder_url = string or nil }
		local function read_certificate_metadata(cert_pem)
			local result = {
				cert_parsed = nil,
				must_staple = false,
				responder_url = nil
			}

			if not cert_pem or #cert_pem == 0 then
				return result
			end

			-- Try to parse with resty.openssl (parse once, extract all)
			if has_resty_ssl then
				local cert, err = resty_x509.new(cert_pem)
				if cert then
					result.cert_parsed = cert

					-- Extract TLS Feature extension for Must-Staple (OID 1.3.6.1.5.5.7.1.24)
					local tls_feature_ext = cert:get_extension("tlsfeature")
					if tls_feature_ext then
						local tls_feature_text = tls_feature_ext:text()
						if tls_feature_text:find("OCSP status request", 1, true) or tls_feature_text:find("5", 1, true) then
							result.must_staple = true
							safe_log(DEBUG, "OCSP-Must-Staple extension found (OID 1.3.6.1.5.5.7.1.24)")
						end
					end

					-- Extract AIA extension for OCSP responder URL (OID 1.3.6.1.5.5.7.48.1)
					local aia_ext = cert:get_extension("authorityInfoAccess")
					if aia_ext then
						local aia_text = aia_ext:text()
						-- Look for OCSP OID with URI format
						local ocsp_url = aia_text:match("1%%.3%%.6%%.1%%.5%%.5%%.7%%.48%%.1%%s*=%%s*URI:([%%w:/.-]+)")
						if not ocsp_url then
							-- Fallback: text-based pattern
							ocsp_url = aia_text:match("OCSP%%s*-%%s*URI:([%%w:/.-]+)")
						end
						if ocsp_url then
							result.responder_url = ocsp_url
							safe_log(DEBUG, "OCSP responder URL found (OID 1.3.6.1.5.5.7.48.1): " .. ocsp_url)
						end
					end

					return result
				else
					safe_log(DEBUG, "Certificate parse error with resty.openssl: " .. tostring(err))
				end
			end

			-- Fallback: use openssl command to extract both Must-Staple and responder URL
			if not has_resty_ssl then
				safe_log(DEBUG, "RESTY.OPENSSL DISABLED: resty.openssl not available in read_certificate_metadata; using openssl fallback server_name=" .. (server_name or "nil"))
			end
			safe_log(DEBUG, "RESTY.OPENSSL DISABLED: OCSP read_certificate_metadata falling back to openssl server_name=" .. (server_name or "nil"))
			pcall(function()
				local worker_id = ngx.worker.id() or "0"
				local tmp_cert = "/tmp/ocsp_cert_meta_w" .. worker_id .. "_c" .. ngx.var.connection .. ".pem"
				local f = io.open(tmp_cert, "w")
				if not f then
					return
				end

				local ok_write = f:write(cert_pem)
				f:close()
				if not ok_write then
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				-- Extract both TLS Feature and OCSP URI in one openssl call
				local handle = io.popen("openssl x509 -text -noout -in " .. tmp_cert .. " 2>/dev/null", "r")
				if not handle then
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				local output = handle:read("*a")
				handle:close()
				pcall(function() os.remove(tmp_cert) end)

				if not output or #output == 0 then
					return
				end

				-- Check for TLS Feature (Must-Staple)
				if output:find("TLS Feature", 1, true) then
					if output:find("OCSP status request", 1, true) or output:find("5", 1, true) then
						result.must_staple = true
						safe_log(DEBUG, "OCSP-Must-Staple extension found via openssl")
					end
				end

				-- Extract OCSP responder URL
				local ocsp_url = output:match("OCSP%s*%-%s*URI:([%w:/.-]+)")
				if ocsp_url then
					result.responder_url = ocsp_url
					safe_log(DEBUG, "OCSP responder URL found via openssl: " .. ocsp_url)
				end
			end)

			return result
		end

		-- Helper: extract OCSP responder URL from certificate using OID 1.3.6.1.5.5.7.48.1
		local function get_ocsp_responder_url(cert_pem)
			if not cert_pem or #cert_pem == 0 then
				return nil
			end

			-- Try native resty.openssl first (fast, OID-based)
			if has_resty_ssl then
				local cert, err = resty_x509.new(cert_pem)
				if cert then
					-- Get AIA extension (OID 1.3.6.1.5.5.7.1.1)
					local aia_ext = cert:get_extension("authorityInfoAccess")
					if aia_ext then
						local aia_text = aia_ext:text()
						-- Look for OCSP OID 1.3.6.1.5.5.7.48.1 with URI format
						-- Text format: "OCSP - URI:http://..." or just extract any http/https URL after OCSP
						local ocsp_url = aia_text:match("1%%.3%%.6%%.1%%.5%%.5%%.7%%.48%%.1%%s*=%%s*URI:([%%w:/.-]+)")
						if not ocsp_url then
							-- Fallback: text-based pattern in case formatting differs
							ocsp_url = aia_text:match("OCSP%%s*-%%s*URI:([%%w:/.-]+)")
						end
						if ocsp_url then
							safe_log(DEBUG, "OCSP found responder URL (OID 1.3.6.1.5.5.7.48.1) in certificate: " .. ocsp_url)
							return ocsp_url
						end
					end
				else
					safe_log(DEBUG, "OCSP resty.openssl parse error: " .. tostring(err))
				end
			end

			if has_resty_ssl then
				safe_log(DEBUG, "RESTY.OPENSSL DISABLED: resty.openssl did not yield an OCSP URL; using openssl fallback server_name=" .. (server_name or "nil"))
			end
			-- Fallback to openssl command (wrap in pcall for safety)
			safe_log(DEBUG, "RESTY.OPENSSL DISABLED: OCSP get_ocsp_responder_url falling back to openssl -ocsp_uri server_name=" .. (server_name or "nil"))
			local ocsp_url = nil
			pcall(function()
				local worker_id = ngx.worker.id() or "0"
				local tmp_cert = "/tmp/ocsp_cert_w" .. worker_id .. "_c" .. ngx.var.connection .. ".pem"
				local f = io.open(tmp_cert, "w")
				if not f then
					safe_log(ERR, "OCSP responder URL: could not open temp file for writing: " .. tmp_cert)
					return
				end

				-- Write with error checking
				local ok_write, write_err = f:write(cert_pem)
				f:close()
				if not ok_write then
					safe_log(ERR, "OCSP responder URL: write failed: " .. (write_err or "unknown"))
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				-- Use openssl to extract OCSP URI (searches for OID 1.3.6.1.5.5.7.48.1 internally)
				-- Ensure cleanup on all paths
				local handle = io.popen("openssl x509 -ocsp_uri -noout -in " .. tmp_cert .. " 2>/dev/null", "r")
				if not handle then
					safe_log(DEBUG, "OCSP responder URL: openssl command failed")
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				local result = handle:read("*a")
				handle:close()
				pcall(function() os.remove(tmp_cert) end)

				if not result or #result == 0 then
					safe_log(DEBUG, "OCSP no responder URL (OID 1.3.6.1.5.5.7.48.1) found in certificate")
					return
				end

				-- Extract URL (openssl x509 -ocsp_uri returns the URL or empty string)
				ocsp_url = result:match("^([%%w:/.-]+)")
				if ocsp_url then
					safe_log(DEBUG, "OCSP found responder URL (OID 1.3.6.1.5.5.7.48.1) in certificate: " .. ocsp_url)
				end
			end)

			return ocsp_url
		end

		-- Helper: check if certificate has OCSP Must-Staple extension (OID 1.3.6.1.5.5.7.1.24)
		local function has_ocsp_must_staple(cert_pem)
			if not cert_pem or #cert_pem == 0 then
				return false
			end

			-- Try native resty.openssl first (fast, OID-based)
			if has_resty_ssl then
				local cert, err = resty_x509.new(cert_pem)
				if cert then
					-- Get TLS Feature extension (OID 1.3.6.1.5.5.7.1.24)
					-- This extension contains the OCSP-must-staple feature
					local tls_feature_ext = cert:get_extension("tlsfeature")
					if tls_feature_ext then
						local tls_feature_text = tls_feature_ext:text()
						-- Look for OCSP status request (5) in the text
						-- openssl reports it as "OCSP status request" or feature code "5"
						if tls_feature_text:find("OCSP status request", 1, true) or tls_feature_text:find("5", 1, true) then
							safe_log(DEBUG, "OCSP-Must-Staple extension found in certificate (OID 1.3.6.1.5.5.7.1.24)")
							return true
						end
					end
				else
					safe_log(DEBUG, "OCSP-Must-Staple check: resty.openssl parse error: " .. tostring(err))
				end
			end

			-- Fallback to openssl command (wrap in pcall for safety)
			if has_resty_ssl then
				safe_log(DEBUG, "RESTY.OPENSSL DISABLED: resty.openssl did not detect Must-Staple; using openssl fallback server_name=" .. (server_name or "nil"))
			end
			safe_log(DEBUG, "RESTY.OPENSSL DISABLED: OCSP has_ocsp_must_staple falling back to openssl server_name=" .. (server_name or "nil"))
			local must_staple = false
			pcall(function()
				local worker_id = ngx.worker.id() or "0"
				local tmp_cert = "/tmp/ocsp_must_staple_w" .. worker_id .. "_c" .. ngx.var.connection .. ".pem"
				local f = io.open(tmp_cert, "w")
				if not f then
					safe_log(DEBUG, "OCSP-Must-Staple check: could not open temp file")
					return
				end

				local ok_write, write_err = f:write(cert_pem)
				f:close()
				if not ok_write then
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				-- Extract TLS Feature extension (OID 1.3.6.1.5.5.7.1.24)
				local handle = io.popen("openssl x509 -text -noout -in " .. tmp_cert .. " 2>/dev/null | grep -A1 'TLS Feature' | head -2", "r")
				if not handle then
					pcall(function() os.remove(tmp_cert) end)
					return
				end

				local result = handle:read("*a")
				handle:close()
				pcall(function() os.remove(tmp_cert) end)

				if result and (result:find("OCSP status request", 1, true) or result:find("5", 1, true)) then
					safe_log(DEBUG, "OCSP-Must-Staple extension found in certificate (OID 1.3.6.1.5.5.7.1.24)")
					must_staple = true
				end
			end)

			return must_staple
		end

		-- Helper: set OCSP stapling from cache (fingerprint-based lookup)
		-- Input: cert_pem - certificate in PEM format string (or nil if from parsed plugin object)
		-- Returns: true if cert is acceptable, false if OCSP-Must-Staple requirement not met
		local function set_ocsp_from_cache(cert_pem, cert_fp_hint)
			safe_log(DEBUG, "OCSP set_ocsp_from_cache() called for server_name=" .. (server_name or "nil"))
			local now = ngx.now or ngx.time
			local hrtime = ngx.hrtime
			local floor = math.floor

			-- Prefer high-resolution timing (hrtime is nanoseconds) so we do not round small ops to 0ms.
			local function ns_since(t0)
				if hrtime then
					-- hrtime() returns nanoseconds as an integer.
					return hrtime() - t0
				end
				-- Fallback: convert seconds to nanoseconds (best effort).
				return floor((now() - t0) * 1000000000 + 0.5)
			end

			if not is_ocsp_stapling_enabled() then
				safe_log(DEBUG, "OCSP stapling disabled via SSL_USE_OCSP_STAPLING setting")
				return true  -- Certificate acceptable even without OCSP
			end

			-- Fail fast if ngx.ocsp module is not available.
			-- In that case, skip OCSP stapling rather than trying to validate and failing late.
			if not ocsp then
			safe_log(ERR, "OCSP DISABLED: ngx.ocsp module failed to load; skipping OCSP stapling for server_name=" .. (server_name or "nil"))
				return true
			end

			-- Plugins may pass either:
			-- - a PEM string (custom parsing)
			-- - an opaque cdata cert pointer returned by ngx.ssl.parse_pem_cert()
			-- We handle both so OCSP can work with letsencrypt/customcert plugins.
			if not cert_pem then
				safe_log(DEBUG, "OCSP no certificate provided, skipping")
				return true
			end
			if type(cert_pem) == "string" and #cert_pem == 0 then
				safe_log(DEBUG, "OCSP empty PEM certificate, skipping fingerprint lookup")
				return true
			end

			-- SAFETY: cdata pointers from ngx.ssl.parse_pem_cert() are STACK_OF(X509)*, not X509*.
			-- Passing them to resty.openssl or ffi.cast("X509*", ...) causes a C-level segfault
			-- that pcall cannot catch. Reject cdata early and log a clear message.
			if type(cert_pem) ~= "string" then
				safe_log(NOTICE, "OCSP cannot fingerprint cdata certificate pointer (type=" .. type(cert_pem) .. ") for " .. (server_name or "unknown") .. " - pass original PEM string for OCSP stapling")
				return true
			end

			-- Extract certificate metadata (Must-Staple)
			-- At this point cert_pem is guaranteed to be a non-empty string (cdata rejected above)
			-- cert_pem may contain the full chain; extract leaf for metadata extraction
			local t_total_start = hrtime and hrtime() or now()
			local leaf_for_meta = cert_pem
			local t_parse_meta_start = hrtime and hrtime() or now()
			local meta_certs = parse_pem_certificates(cert_pem)
			safe_log(DEBUG, "OCSP parse_pem_certificates(meta) time_ns=" .. tostring(ns_since(t_parse_meta_start)) .. " server_name=" .. (server_name or "nil"))
			if meta_certs and #meta_certs > 0 then
				leaf_for_meta = meta_certs[1]
			end
			local has_must_staple = false
			local t_meta_start = hrtime and hrtime() or now()
			local ok_read, cert_meta = pcall(read_certificate_metadata, leaf_for_meta)
			safe_log(DEBUG, "OCSP read_certificate_metadata time_ns=" .. tostring(ns_since(t_meta_start)) .. " server_name=" .. (server_name or "nil"))
			if ok_read and cert_meta then
				has_must_staple = cert_meta.must_staple
				if has_must_staple then
					safe_log(INFO, "OCSP-Must-Staple extension detected in certificate for " .. (server_name or "unknown"))
				end
			end

			-- Compute certificate public key fingerprint(s) (unique identifiers).
			-- `cert_pem` may contain the full chain; the real leaf is not always the first PEM block.
			-- To handle that safely, we try multiple certificate-block fingerprints until we find an existing `ocsp.der`.
			local t_fp_phase_start = hrtime and hrtime() or now()
			local resp = nil
			local tried_fps = {}
			local candidate_fps = {}
			local fp_to_cert_pem = {}

			-- Prefer pre-computed fingerprint hint from the plugin (index 5 in letsencrypt/customcert internalstore).
			-- Still validate by file existence (handshake-time chain ordering can differ).
			if cert_fp_hint and type(cert_fp_hint) == "string" then
				local fp = tostring(cert_fp_hint):lower()
				if is_fp64_lower_hex(fp) and not tried_fps[fp] then
					candidate_fps[#candidate_fps + 1] = fp
					tried_fps[fp] = true
				end
			end

			local t_parse_chain_start = hrtime and hrtime() or now()
			local chain_certs = parse_pem_certificates(cert_pem)
			safe_log(DEBUG, "OCSP parse_pem_certificates(chain) time_ns=" .. tostring(ns_since(t_parse_chain_start)) .. " server_name=" .. (server_name or "nil"))
			if not chain_certs or #chain_certs == 0 then
				chain_certs = { cert_pem }
			end

			-- Optional optimization: mapping subject -> PEM.
			-- If unavailable, issuer validation still works by trying all chain certs as possible issuers.
			local chain_subject_to_pem = {}

			local der_chain_cache = {}
			if #chain_certs > 1 then
				safe_log(DEBUG, "OCSP will try multiple certificate blocks from chain of " .. #chain_certs .. " certificate(s) server_name=" .. (server_name or "nil"))
			end

			-- Add fingerprints for each certificate block (may include the real leaf and intermediates)
			local t_fp_candidates_start = hrtime and hrtime() or now()
			for idx, cert_block_pem in ipairs(chain_certs) do
				local fp = get_ocsp_pubkey_fingerprint(cert_block_pem)
				if fp then
					-- Ensure we keep the PEM block for each computed fingerprint, even
					-- if it was already present from a plugin fingerprint hint.
					if not fp_to_cert_pem[fp] then
						fp_to_cert_pem[fp] = cert_block_pem
					end
					if not tried_fps[fp] then
						candidate_fps[#candidate_fps + 1] = fp
						tried_fps[fp] = true
					end
				end
				if type(fp) == "string" then
					safe_log(DEBUG, "OCSP cert block #" .. idx .. " pem_len=" .. tostring(#cert_block_pem) .. " fp=" .. fp:sub(1, 16) .. "... server_name=" .. (server_name or "nil"))
				else
					safe_log(DEBUG, "OCSP cert block #" .. idx .. " pem_len=" .. tostring(cert_block_pem and #cert_block_pem or 0) .. " fp=nil server_name=" .. (server_name or "nil"))
				end
			end
			safe_log(DEBUG, "OCSP candidate_fps compute time_ns=" .. tostring(ns_since(t_fp_candidates_start)) .. " server_name=" .. (server_name or "nil"))

			if cert_fp_hint and type(cert_fp_hint) == "string" then
				safe_log(DEBUG, "OCSP cert_fp_hint=" .. (cert_fp_hint:sub(1, 16) .. "...") .. " server_name=" .. (server_name or "nil"))
			else
				safe_log(DEBUG, "OCSP cert_fp_hint=nil server_name=" .. (server_name or "nil"))
			end

			safe_log(DEBUG, "OCSP candidate_fps count=" .. tostring(#candidate_fps) .. " server_name=" .. (server_name or "nil"))

			if #candidate_fps == 0 then
				safe_log(NOTICE, "OCSP could not compute any certificate fingerprints for " .. (server_name or "unknown"))
				if has_must_staple then
					safe_log(ERR, "OCSP-Must-Staple required but cannot verify certificate - will attempt TLS anyway")
				end
				return true
			end

			-- Cryptographic OCSP validation (fast + secure) using ngx.ocsp.
			-- Returns:
			-- - true  => validated (cryptographically) and should be cached as verified
			-- - false => validated and rejected
			-- - nil   => validation skipped (insufficient data), caller may decide how to proceed
			local function ocsp_validate_response_for_fp(cert_fp, cert_for_fp_pem, ocsp_der)
				local t_fn_start_hr = hrtime and hrtime() or nil
				local t_fn_start_sec = now()
				safe_log(DEBUG, "OCSP ocsp_validate_response_for_fp start fp=" .. tostring(cert_fp and cert_fp:sub(1, 16) .. "...") .. " server_name=" .. (server_name or "nil"))
				local function finish(retv)
					local time_ns = nil
					if t_fn_start_hr then
						time_ns = hrtime() - t_fn_start_hr
					end
					-- `ngx.hrtime()` can be too fine/granular to show movement (sometimes 0); log us/ms too.
					local time_us = floor(((now() - t_fn_start_sec) * 1000000) + 0.5)
					local time_ms = floor(((now() - t_fn_start_sec) * 1000) + 0.5)
					safe_log(
						DEBUG,
						"OCSP ocsp_validate_response_for_fp end fp=" .. tostring(cert_fp and cert_fp:sub(1, 16) .. "...") ..
							" result=" .. tostring(retv) ..
							" time_ns=" .. tostring(time_ns) ..
							" time_us=" .. tostring(time_us) ..
							" time_ms=" .. tostring(time_ms) ..
							" server_name=" .. (server_name or "nil")
					)
					return retv
				end

				if not ocsp then
					return finish(false)
				end
				-- Do not require resty.openssl.x509 for validation.
				-- We can still build the DER chain via ngx.ssl and validate via ngx.ocsp.
				if not ssl or not ssl.cert_pem_to_der then
					return finish(false)
				end
				if not cert_for_fp_pem or type(cert_for_fp_pem) ~= "string" then
					return finish(false)
				end

				-- If validation previously failed for this cert fingerprint, avoid re-parsing/re-verifying
				-- for a short period. This prevents getting "stuck" on repeated bad/poisoned cache entries.
				local ocsp_validate_failed_key = "TLS:SSL:ocsp_validate_failed:" .. cert_fp
				local ocsp_validate_failed = false
				pcall(function()
					ocsp_validate_failed = internalstore:get(ocsp_validate_failed_key, true) == true
				end)
				if ocsp_validate_failed then
					return finish(false)
				end

				local ocsp_validate_failure_ttl = 60
				local ocsp_validate_timeout_total_ns = 700000000 -- 700ms budget across issuer attempts
				local ocsp_validate_max_issuer_candidates = 4
				local t_val_total_start = hrtime and hrtime() or now()
				local issuer_name = nil
				if has_resty_ssl and resty_x509 and resty_x509.new then
					-- Optional fast-path: use resty.openssl to derive issuer DN.
					local leaf_cert_obj = resty_x509.new(cert_for_fp_pem)
					if leaf_cert_obj then
						local issuer_name_obj = leaf_cert_obj:get_issuer_name()
						if issuer_name_obj then
							issuer_name = tostring(issuer_name_obj)
						end
					end
				end

				if not chain_certs or #chain_certs < 2 then
					return finish(false)
				end

				-- Try to validate against multiple possible issuer certificates.
				-- ngx.ocsp.validate_ocsp_response() verifies the OCSP signature and binds it to the
				-- certificate via OCSP CertID, so we can safely try issuers in any order.
				local issuer_pems_to_try = {}
				if issuer_name then
					local issuer_pem = chain_subject_to_pem and chain_subject_to_pem[issuer_name] or nil
					if issuer_pem then
						issuer_pems_to_try[#issuer_pems_to_try + 1] = issuer_pem
					end
				end
				local seen_issuer = {}
				for _, p in ipairs(issuer_pems_to_try) do
					seen_issuer[p] = true
				end
				for _, cert_block_pem in ipairs(chain_certs) do
					if cert_block_pem and cert_block_pem ~= cert_for_fp_pem then
						-- Avoid duplicates when the DN-mapped issuer is already added.
						if not seen_issuer[cert_block_pem] then
							issuer_pems_to_try[#issuer_pems_to_try + 1] = cert_block_pem
							seen_issuer[cert_block_pem] = true
						end
					end
				end

				if #issuer_pems_to_try == 0 then
					return finish(false)
				end
				if #issuer_pems_to_try > ocsp_validate_max_issuer_candidates then
					-- Keep the most likely issuer candidates to avoid excessive parsing.
					-- Order does not matter for security because CertID matching is inside validate().
					issuer_pems_to_try = { unpack(issuer_pems_to_try, 1, ocsp_validate_max_issuer_candidates) }
				end

				local cached_by_issuer = der_chain_cache[cert_fp]
				if not cached_by_issuer then
					cached_by_issuer = {}
					der_chain_cache[cert_fp] = cached_by_issuer
				end

				for issuer_idx, issuer_candidate_pem in ipairs(issuer_pems_to_try) do
					-- Soft total-time budget: stop trying more issuers if we already spent too long.
					if (hrtime and hrtime() or now()) - t_val_total_start > ocsp_validate_timeout_total_ns then
						safe_log(
							ERR,
							"OCSP validate budget exceeded for fp=" .. cert_fp:sub(1, 16) .. "... server_name=" .. (server_name or "nil")
						)
						break
					end

					local der_chain = cached_by_issuer[issuer_idx]
					if not der_chain then
						local ordered_chain_pem = cert_for_fp_pem .. "\n" .. issuer_candidate_pem
						local der_cert_chain, err = ssl.cert_pem_to_der(ordered_chain_pem)
						if der_cert_chain then
							cached_by_issuer[issuer_idx] = der_cert_chain
							der_chain = der_cert_chain
						else
							safe_log(DEBUG, "OCSP validate skipped (cert_pem_to_der failed): " .. tostring(err) .. " server_name=" .. (server_name or "nil"))
							der_chain = nil
						end
					end

					if der_chain then
						local ok_pcall, validate_ok, validate_err_or_next = pcall(function()
							return ocsp.validate_ocsp_response(ocsp_der, der_chain)
						end)
						if ok_pcall and validate_ok == true then
							return finish(true)
						end
					end
				end

				-- Validation failed: remember it briefly to avoid repeated expensive checks.
				pcall(function()
					internalstore:set(ocsp_validate_failed_key, true, ocsp_validate_failure_ttl, true)
				end)
				return finish(false)
			end

			-- Leaf-first sequential lookup:
			-- ocsp-refresh.py stores OCSP responses for the leaf certificate public-key fingerprint.
			-- The chain PEM order is not guaranteed, so we re-order candidate_fps by first fingerprint
			-- that actually has an on-disk `ocsp.der` cache file.
			local candidate_fps_ordered = candidate_fps
			local leaf_fp = nil
			local t_leaf_scan_start = hrtime and hrtime() or now()
			pcall(function()
				for _, cert_fp in ipairs(candidate_fps) do
					if is_fp64_lower_hex(cert_fp) then
						local hex1 = cert_fp:sub(1, 1)
						local hex2 = cert_fp:sub(2, 2)
						local ocsp_path_tmp = "/var/cache/bunkerweb/ssl/" .. hex1 .. "/" .. hex2 .. "/" .. cert_fp .. "/ocsp.der"
						local fcheck = io.open(ocsp_path_tmp, "rb")
						if fcheck then
							fcheck:close()
							leaf_fp = cert_fp
							safe_log(DEBUG, "OCSP leaf fingerprint detected (ocsp.der exists) server_name=" .. (server_name or "nil") .. " fp=" .. leaf_fp:sub(1, 16) .. "...")
							break
						end
					end
				end
			end)

			safe_log(DEBUG, "OCSP leaf scan time_ns=" .. tostring(ns_since(t_leaf_scan_start)) .. " server_name=" .. (server_name or "nil"))

			if leaf_fp and is_fp64_lower_hex(leaf_fp) then
				candidate_fps_ordered = {}
				candidate_fps_ordered[#candidate_fps_ordered + 1] = leaf_fp
				for _, cert_fp in ipairs(candidate_fps) do
					if cert_fp ~= leaf_fp then
						candidate_fps_ordered[#candidate_fps_ordered + 1] = cert_fp
					end
				end
			end

			safe_log(DEBUG, "OCSP fingerprint phase total_ns=" .. tostring(ns_since(t_fp_phase_start)) .. " server_name=" .. (server_name or "nil"))

			for _, cert_fp in ipairs(candidate_fps_ordered) do
				local t_attempt_start = hrtime and hrtime() or now()
				local attempt_hit = false
				safe_log(DEBUG, "OCSP trying candidate fingerprint raw=" .. tostring(cert_fp) .. " server_name=" .. (server_name or "nil"))
				if is_fp64_lower_hex(cert_fp) then
					safe_log(DEBUG, "OCSP trying fingerprint: " .. cert_fp:sub(1, 16) .. "... server_name=" .. (server_name or "nil"))

					-- Use tree-structured sharded path: /var/cache/bunkerweb/ssl/{hex1}/{hex2}/{full_fingerprint}/ocsp.der
					local hex1 = cert_fp:sub(1, 1)
					local hex2 = cert_fp:sub(2, 2)
					local ocsp_path = "/var/cache/bunkerweb/ssl/" .. hex1 .. "/" .. hex2 .. "/" .. cert_fp .. "/ocsp.der"
					local cache_key = "TLS:SSL:ocsp:" .. cert_fp
					safe_log(DEBUG, "OCSP lookup ocsp_path=" .. ocsp_path .. " server_name=" .. (server_name or "nil"))

					-- 1) Try local shared dict lookup first (per-worker cache)
					local ok_cache, cache_result = pcall(function()
						return internalstore:get(cache_key, true)
					end)
					if ok_cache and cache_result then
						local verified_key = "TLS:SSL:ocsp_verified:" .. cert_fp
						local ocsp_verified = false
						pcall(function()
							ocsp_verified = internalstore:get(verified_key, true)
						end)

						local ocsp_ok = ocsp_verified == true
						local ocsp_validated_now = ocsp_verified == true
						if not ocsp_ok then
						local hex1 = cert_fp:sub(1, 1)
						local hex2 = cert_fp:sub(2, 2)
						local ocsp_dir = "/var/cache/bunkerweb/ssl/" .. hex1 .. "/" .. hex2 .. "/" .. cert_fp
						local fp_ok = verify_ocsp_fingerprint_match(cert_fp, ocsp_dir)
						if fp_ok then
							local cert_for_fp_pem = fp_to_cert_pem[cert_fp] or leaf_for_meta
							local validate_res = ocsp_validate_response_for_fp(cert_fp, cert_for_fp_pem, cache_result)
							if validate_res == true then
								ocsp_ok = true
								ocsp_validated_now = true
								pcall(function()
									internalstore:set(verified_key, true, 300, true)
								end)
							else
								ocsp_ok = false
								-- If metadata fingerprint matches but OCSP cryptographic validation fails,
								-- check whether the OCSP response serial actually belongs to a different
								-- certificate while sharing the same fingerprint.
								--
								-- This is treated as a cache collision / hash collision symptom.
								local report_key = "TLS:SSL:ocsp_hash_collision_reported:" .. cert_fp
								local already_reported = false
								pcall(function()
									already_reported = internalstore:get(report_key, true) == true
								end)
								if not already_reported then
									local serial_mismatch = false
									pcall(function()
										if cert_for_fp_pem and type(cert_for_fp_pem) == "string" then
											serial_mismatch = (verify_ocsp_cert_match(cert_for_fp_pem, cache_result) == false)
										end
									end)
									if serial_mismatch then
										pcall(function()
											internalstore:set(report_key, true, 300, true) -- throttle per fingerprint
										end)
										safe_log(
											ERR,
											"HASH COLLISION DETECTED: OCSP response serial mismatch for fp=" ..
												cert_fp:sub(1, 16) .. "... server_name=" .. (server_name or "nil")
										)
									end
								end
							end
						end

						if ocsp_ok then
							resp = cache_result
							attempt_hit = true
							safe_log(DEBUG, "OCSP found response in shared memory cache for fp=" .. cert_fp:sub(1, 16) .. "... verified=" .. tostring(ocsp_validated_now) .. " server_name=" .. (server_name or "nil"))
							break
						else
							safe_log(ERR, "OCSP cached response rejected (fingerprint mismatch); discarding cache for fp=" .. cert_fp:sub(1, 16) .. "... server_name=" .. (server_name or "nil"))
							pcall(function()
								internalstore:delete(cache_key)
								internalstore:delete(verified_key)
							end)
							end
						end
					end

					-- 2) Fallback to disk file
					safe_log(DEBUG, "OCSP looking for cached response at: " .. ocsp_path .. " server_name=" .. (server_name or "nil"))
					pcall(function()
						local f, err = io.open(ocsp_path, "rb")
						if f then
							local data = f:read("*a")
							f:close()

							if data and #data > 0 then
								local verified_key = "TLS:SSL:ocsp_verified:" .. cert_fp
								local ocsp_verified = false
								pcall(function()
									ocsp_verified = internalstore:get(verified_key, true)
								end)

								local ocsp_ok = ocsp_verified == true
								if not ocsp_ok then
									local hex1 = cert_fp:sub(1, 1)
									local hex2 = cert_fp:sub(2, 2)
									local ocsp_dir = "/var/cache/bunkerweb/ssl/" .. hex1 .. "/" .. hex2 .. "/" .. cert_fp
									local fp_ok = verify_ocsp_fingerprint_match(cert_fp, ocsp_dir)
									if fp_ok then
										local cert_for_fp_pem = fp_to_cert_pem[cert_fp] or leaf_for_meta
										local validate_res = ocsp_validate_response_for_fp(cert_fp, cert_for_fp_pem, data)
										if validate_res == true then
											ocsp_ok = true
											pcall(function()
												internalstore:set(verified_key, true, 300, true)
											end)
										else
											ocsp_ok = false
											-- Detect cache collision symptom (serial mismatch while fingerprint matches).
											local report_key = "TLS:SSL:ocsp_hash_collision_reported:" .. cert_fp
											local already_reported = false
											pcall(function()
												already_reported = internalstore:get(report_key, true) == true
											end)
											if not already_reported then
												local serial_mismatch = false
												pcall(function()
													if cert_for_fp_pem and type(cert_for_fp_pem) == "string" then
														serial_mismatch = (verify_ocsp_cert_match(cert_for_fp_pem, data) == false)
													end
												end)
												if serial_mismatch then
													pcall(function()
														internalstore:set(report_key, true, 300, true) -- throttle per fingerprint
													end)
													safe_log(
														ERR,
														"HASH COLLISION DETECTED: OCSP response serial mismatch for fp=" ..
															cert_fp:sub(1, 16) .. "... server_name=" .. (server_name or "nil")
													)
												end
											end
										end
									end
								end

								if ocsp_ok then
									resp = data
									attempt_hit = true
									safe_log(INFO, "OCSP loaded response from: " .. ocsp_path .. " server_name=" .. (server_name or "nil"))

									-- Cache in shared memory (TTL 300s)
									pcall(function()
										local ok_cache_set = internalstore:set(cache_key, resp, 300, true)
										if not ok_cache_set then
											safe_log(DEBUG, "OCSP failed to cache response in shared memory server_name=" .. (server_name or "nil"))
										end
									end)
								else
									safe_log(ERR, "OCSP rejected (fingerprint mismatch); skipping invalid ocsp.der at: " .. ocsp_path .. " server_name=" .. (server_name or "nil"))
								end
							else
								safe_log(DEBUG, "OCSP response file is empty: " .. ocsp_path .. " server_name=" .. (server_name or "nil"))
							end
						else
							if err and lower(err):find("permission denied", 1, true) then
								safe_log(ERR, "OCSP permission denied reading " .. ocsp_path .. " server_name=" .. (server_name or "nil"))
							else
								safe_log(DEBUG, "OCSP response file not found: " .. ocsp_path .. " server_name=" .. (server_name or "nil"))
							end
						end
					end)

					safe_log(
						DEBUG,
						"OCSP attempt fp=" .. cert_fp:sub(1, 16) .. "..." ..
							" hit=" .. tostring(attempt_hit) ..
							" time_ns=" .. tostring(ns_since(t_attempt_start)) ..
							" server_name=" .. (server_name or "nil")
					)
					if resp then
						break
					end
				else
					safe_log(DEBUG, "OCSP skipping invalid fingerprint format: " .. tostring(cert_fp) .. " server_name=" .. (server_name or "nil"))
				end
			end

			if not resp then
				safe_log(DEBUG, "OCSP response not found for any tried certificate public-key fingerprint(s) (server_name=" .. (server_name or "unknown") .. ")")
				if has_must_staple then
					safe_log(ERR, "OCSP-Must-Staple required but OCSP response not found - will attempt TLS anyway")
				end
				return true
			end

			-- Safely set OCSP stapling with exception handling (only if ocsp module is available)
			if not ocsp then
				safe_log(DEBUG, "OCSP not available (ngx.ocsp module not loaded)")
				return true
			end
			local ok_pcall, ok_set, oerr = pcall(function()
				return ocsp.set_ocsp_status_resp(resp)
			end)

			if not ok_pcall then
				safe_log(ERR, "OCSP exception while setting stapling: " .. tostring(ok_set))
			else
				if not ok_set then
					safe_log(ERR, "OCSP failed to set stapling: " .. (oerr or "unknown"))
				else
					safe_log(DEBUG, "OCSP stapling set from cache for " .. server_name)
				end
			end

			-- If we reach here without returning earlier, OCSP failed but is not required (or succeeded)
			safe_log(DEBUG, "OCSP set_ocsp_from_cache total time_ns=" .. tostring(ns_since(t_total_start)) .. " server_name=" .. (server_name or "nil"))
			return true
		end

		-- Call ssl_certificate() methods
		safe_log(INFO, "calling ssl_certificate() methods of plugins ...")
		for _, plugin_id in ipairs(phase_order) do
			-- Require call
			safe_log(DEBUG, "Loading plugin: " .. plugin_id)
			local plugin_lua, err = require_plugin(plugin_id)
			if plugin_lua == false then
				safe_log(ERR, "Failed to load plugin " .. plugin_id .. " (not found): " .. (err or "unknown"))
			elseif plugin_lua == nil then
				safe_log(DEBUG, "Plugin " .. plugin_id .. " module not found or failed to load: " .. (err or "unknown"))
			else
				safe_log(DEBUG, "Plugin " .. plugin_id .. " loaded successfully")
				-- Check if plugin has ssl_certificate method
				if plugin_lua.ssl_certificate ~= nil then
					-- New call
					local ok_p, plugin_obj = new_plugin(plugin_lua)
					if not ok_p then
						safe_log(ERR, plugin_obj)
					else
						local ok_c, ret = call_plugin(plugin_obj, "ssl_certificate")
						if not ok_c then
							safe_log(ERR, ret)
						elseif not ret.ret then
							safe_log(ERR, plugin_id .. ":ssl_certificate() call failed : " .. ret.msg)
						else
							safe_log(DEBUG, plugin_id .. ":ssl_certificate() call successful : " .. ret.msg)
								if ret.status then
							safe_log(DEBUG, plugin_id .. " is setting certificate/key(s) : " .. ret.msg)

							-- Clear old certificates before setting new ones (fail-safe)
							pcall(clear_certs)

							-- Some plugins return PEM strings; others return already-parsed ngx.ssl objects.
							local cert_data = ret.status[1]
							local key_data = ret.status[2]

							local cert_key_pairs = {}
							local ocsp_possible = false

							if type(cert_data) == "string" and type(key_data) == "string" then
								-- Parse multiple certificates and keys (support RSA, ECDSA, PQC, etc.)
								local cert_pem = cert_data
								local key_pem = key_data

								local certs = parse_pem_certificates(cert_pem)
								local keys = parse_pem_keys(key_pem)
								cert_key_pairs = pair_certs_and_keys(certs, keys)
								ocsp_possible = true
							else
								-- Assume ngx.ssl.parse_pem_* was already called by the plugin
								-- Check if original PEM strings are available at indices 3,4 (e.g., from letsencrypt plugin)
								local orig_cert_pem = nil
								local orig_cert_fp = nil
								-- Skip OCSP fingerprint preparation entirely when ngx.ocsp is disabled.
								if ocsp then
									if ret.status[3] and type(ret.status[3]) == "string" then
										orig_cert_pem = ret.status[3]
										safe_log(DEBUG, "Original PEM certificate available for OCSP fingerprinting (" .. #orig_cert_pem .. " bytes)")
									end
									-- Optional fingerprint hint at index 5 (computed in letsencrypt/customcert load_data)
									if ret.status[5] and type(ret.status[5]) == "string" then
										local fp = ret.status[5]:lower():match("^[0-9a-f]{64}$")
										if fp then
											orig_cert_fp = fp
											safe_log(DEBUG, "Original cert fingerprint available for OCSP (" .. fp:sub(1, 16) .. "... )")
										end
									end
								end
								cert_key_pairs = {
									{
										cert = cert_data,
										key = key_data,
										cert_id = "parsed",
										matched = true,
										cert_pem_for_ocsp = orig_cert_pem,
										cert_fp_for_ocsp = orig_cert_fp,
									},
								}
							end

							if #cert_key_pairs == 0 then
								safe_log(ERR, "No valid certificate/key pairs extracted from " .. plugin_id)
							else
								safe_log(INFO, "Found " .. #cert_key_pairs .. " certificate/key pair(s) from " .. plugin_id)

								local all_certs_set = true

								-- Loop through each certificate/key pair
								for idx, pair in ipairs(cert_key_pairs) do
									safe_log(DEBUG, "Setting certificate #" .. idx .. " (" .. pair.cert_id .. ") from " .. plugin_id .. (pair.matched and " [matched key]" or " [unmatched - no key found]"))

									-- Try to set the certificate
									local ok_cert, err_cert = set_cert(pair.cert)
									if not ok_cert then
										safe_log(ERR, "error while setting certificate #" .. idx .. " (" .. pair.cert_id .. ") from " .. plugin_id .. ": " .. (err_cert or "unknown"))
										all_certs_set = false
									else
										-- Certificate set successfully, now try to set private key (if available)
										local ok_key = true
										local err_key = nil

										if pair.key then
											ok_key, err_key = set_priv_key(pair.key)
											if not ok_key then
												safe_log(ERR, "error while setting private key #" .. idx .. " (" .. pair.cert_id .. ") from " .. plugin_id .. ": " .. (err_key or "unknown"))
												all_certs_set = false
											end
										else
											safe_log(NOTICE, "Certificate #" .. idx .. " (" .. pair.cert_id .. ") has no matched private key - continuing without key (may fail during TLS handshake)")
										end

										-- Attempt OCSP stapling whenever key + cert are available.
										-- Use original PEM string for OCSP fingerprinting (safe); fall back to cdata only if no PEM available.
										if ok_key then
											local ocsp_cert = pair.cert_pem_for_ocsp or pair.cert
											local ocsp_fp_hint = pair.cert_fp_for_ocsp
											if ocsp then
												safe_log(DEBUG, "Setting OCSP for certificate #" .. idx .. " (" .. pair.cert_id .. ") (server_name=" .. server_name .. ", cert_type=" .. type(ocsp_cert) .. ")")
												local ok_ocsp, ocsp_cert_acceptable = pcall(set_ocsp_from_cache, ocsp_cert, ocsp_fp_hint)
												if not ok_ocsp then
													safe_log(ERR, "OCSP function error for cert #" .. idx .. " (" .. pair.cert_id .. "): " .. tostring(ocsp_cert_acceptable))
												elseif ocsp_cert_acceptable == false then
													-- OCSP-Must-Staple requirement not met - log but continue (failsafe)
													safe_log(ERR, "OCSP-Must-Staple requirement not met for cert #" .. idx .. " (" .. pair.cert_id .. ") (server_name=" .. server_name .. ") - proceeding anyway")
												else
													safe_log(DEBUG, "OCSP loaded successfully for certificate #" .. idx .. " (" .. pair.cert_id .. ")")
												end
											else
												safe_log(DEBUG, "Skipping OCSP setup because ngx.ocsp is disabled (server_name=" .. (server_name or "nil") .. ")")
											end
										end
									end -- end ok_cert
								end -- end for each cert/key pair

								if all_certs_set then
									safe_log(INFO, "all " .. #cert_key_pairs .. " certificate(s) and key(s) set by " .. plugin_id)
									return true
								else
									safe_log(NOTICE, "some certificates from " .. plugin_id .. " failed to set, continuing to next plugin")
								end
							end -- end cert_key_pairs check
						end -- end call_plugin result
					end -- end new_plugin result
				end
				else
					safe_log(DEBUG, "skipped execution of " .. plugin_id .. " because method ssl_certificate() is not defined")
				end -- end ssl_certificate defined check
			end -- end plugin_lua result check
		end -- end for loop

		safe_log(INFO, "ssl_certificate phase ended")

		-- Cleanup old temp files at the very end to prioritize speed
		cleanup_temp_files()

		return true
	end)

	if not ok then
		ngx.log(ngx.ERR, ("SSL-CERTIFICATE critical error in Lua block: " .. tostring(err)):sub(1, 2048))
	end
	return true  -- Always return true so nginx uses default certificate on any error
}
