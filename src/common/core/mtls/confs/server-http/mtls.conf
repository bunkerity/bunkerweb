{% if USE_MTLS == "yes" %}
	{%- set pathlib = import("pathlib") -%}
	{%- set ns = namespace(enable=true) -%}
	{%- set verify_mode = MTLS_VERIFY_CLIENT -%}
	{%- set ca_cache = "/var/cache/bunkerweb/mtls/" ~ SERVER_NAME.split(" ")[0] ~ "/ca.pem" -%}
	{%- set crl_cache = "/var/cache/bunkerweb/mtls/" ~ SERVER_NAME.split(" ")[0] ~ "/crl.pem" -%}
	{% if pathlib.Path(ca_cache).is_file() %}
ssl_client_certificate {{ ca_cache }};
ssl_trusted_certificate {{ ca_cache }};
		{% if pathlib.Path(crl_cache).is_file() %}
ssl_crl {{ crl_cache }};
		{% endif %}
	{% elif verify_mode != "optional_no_ca" %}
# mTLS disabled for this server: trusted client CA bundle not available. Set MTLS_CA_CERTIFICATE or MTLS_CA_CERTIFICATE_DATA; the Scheduler validates and distributes it to every instance.
		{% set ns.enable = false %}
	{% endif %}

	{% if ns.enable %}
ssl_verify_client {{ verify_mode }};
ssl_verify_depth {{ MTLS_VERIFY_DEPTH }};
	{% endif %}
{% endif %}
