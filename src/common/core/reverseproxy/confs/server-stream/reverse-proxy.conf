{%- if USE_REVERSE_PROXY == "yes" and REVERSE_PROXY_HOST != "" -%}
	{%- if REVERSE_PROXY_SSL_SNI == "yes" -%}
proxy_ssl_server_name on;
		{% if REVERSE_PROXY_SSL_SNI_NAME != "" %}
proxy_ssl_name {{ REVERSE_PROXY_SSL_SNI_NAME }};
		{% endif %}
	{%- else %}
proxy_ssl_server_name off;
	{%- endif %}

	{% if REVERSE_PROXY_SSL_VERIFY == "yes" %}
		{%- set pathlib = import("pathlib") -%}
		{%- set rp_ca_cache = "/var/cache/bunkerweb/reverseproxy/" ~ SERVER_NAME.split(" ")[0] ~ "/trusted-ca.pem" -%}
		{% if pathlib.Path(rp_ca_cache).is_file() %}
proxy_ssl_verify on;
proxy_ssl_verify_depth {{ REVERSE_PROXY_SSL_VERIFY_DEPTH }};
proxy_ssl_trusted_certificate {{ rp_ca_cache }};
		{% else %}
# proxy_ssl_verify disabled: no trusted certificate available (set REVERSE_PROXY_SSL_TRUSTED_CERTIFICATE or _DATA, or point it at the system CA bundle).
proxy_ssl_verify off;
		{% endif %}
	{% else %}
proxy_ssl_verify off;
	{% endif %}

# TODO: Add more settings specific to stream
	{% if USE_PROXY_PROTOCOL == "yes" %}
proxy_protocol on;
	{% endif %}

set $backend "{{ SERVER_NAME.split(" ")[0] }}";
proxy_pass $backend;

{%- endif %}
