{%- if USE_GRPC == "yes" -%}

	{% if GRPC_SSL_SNI == "yes" %}
grpc_ssl_server_name on;
		{% if GRPC_SSL_SNI_NAME != "" %}
grpc_ssl_name {{ GRPC_SSL_SNI_NAME }};
		{% endif %}
	{% else %}
grpc_ssl_server_name off;
	{% endif %}

	{% if GRPC_INTERCEPT_ERRORS == "yes" %}
grpc_intercept_errors on;
	{% else %}
grpc_intercept_errors off;
	{% endif %}

	{% set hosts = namespace() %}
	{% set hosts.list = [] %}
	{% for k, v in all.items() %}
		{% if k.startswith("GRPC_HOST") and v != "" %}
			{% set suffix = k[9:] %}
			{% if not suffix or suffix.startswith("_") %}
				{% set index = suffix[1:] if suffix else "0" %}
				{% set hosts.list = hosts.list + [(index|int, k, v)] %}
			{% endif %}
		{% endif %}
	{% endfor %}
	{% for index, k, host in hosts.list|sort %}
			{% set url = all[k.replace("HOST", "URL")] if k.replace("HOST", "URL") in all else "/" %}
			{% set headers = all[k.replace("HOST", "HEADERS")] if k.replace("HOST", "HEADERS") in all else "" %}
			{% set hide_headers = all[k.replace("HOST", "HIDE_HEADERS")] if k.replace("HOST", "HIDE_HEADERS") in all else "" %}
			{% set connect_timeout = all[k.replace("HOST", "CONNECT_TIMEOUT")] if k.replace("HOST", "CONNECT_TIMEOUT") in all else "60s" %}
			{% set read_timeout = all[k.replace("HOST", "READ_TIMEOUT")] if k.replace("HOST", "READ_TIMEOUT") in all else "60s" %}
			{% set send_timeout = all[k.replace("HOST", "SEND_TIMEOUT")] if k.replace("HOST", "SEND_TIMEOUT") in all else "60s" %}
			{% set socket_keepalive = all[k.replace("HOST", "SOCKET_KEEPALIVE")] if k.replace("HOST", "SOCKET_KEEPALIVE") in all else "off" %}
			{% set next_upstream = all[k.replace("HOST", "NEXT_UPSTREAM")] if k.replace("HOST", "NEXT_UPSTREAM") in all else "" %}
			{% set next_upstream_timeout = all[k.replace("HOST", "NEXT_UPSTREAM_TIMEOUT")] if k.replace("HOST", "NEXT_UPSTREAM_TIMEOUT") in all else "" %}
			{% set next_upstream_tries = all[k.replace("HOST", "NEXT_UPSTREAM_TRIES")] if k.replace("HOST", "NEXT_UPSTREAM_TRIES") in all else "" %}
			{% set includes = all[k.replace("HOST", "INCLUDES")] if k.replace("HOST", "INCLUDES") in all else "" %}
location {{ url }} {
			{% if USE_MODSECURITY == "yes" %}
	modsecurity off;
			{% endif %}
	set $grpc_backend{{ index }} "{{ host }}";
	grpc_pass $grpc_backend{{ index }};
	grpc_set_header Host {% if GRPC_CUSTOM_HOST != "" %}"{{ GRPC_CUSTOM_HOST }}"{% else %}$host{% endif %};
	grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	grpc_set_header X-Real-IP $remote_addr;
	grpc_set_header X-Forwarded-Proto $scheme;
	grpc_set_header X-Forwarded-Host {% if GRPC_CUSTOM_HOST != "" %}"{{ GRPC_CUSTOM_HOST }}"{% else %}$http_host{% endif %};
	grpc_set_header TE trailers;
			{% if url.startswith("/") %}
	grpc_set_header X-Forwarded-Prefix "{{ url }}";
			{% endif %}
			{% if USE_MTLS == "yes" and MTLS_FORWARD_CLIENT_HEADERS == "yes" %}
	grpc_set_header X-SSL-Client-Verify $ssl_client_verify;
	grpc_set_header X-SSL-Client-DN $ssl_client_s_dn;
	grpc_set_header X-SSL-Issuer $ssl_client_i_dn;
	grpc_set_header X-SSL-Client-Serial $ssl_client_serial;
	grpc_set_header X-SSL-Client-Fingerprint $ssl_client_fingerprint;
	grpc_set_header X-SSL-Client-NotBefore $ssl_client_v_start;
	grpc_set_header X-SSL-Client-NotAfter $ssl_client_v_end;
			{% endif %}
			{% if headers != "" %}
				{% for header in headers.split(";") %}
	grpc_set_header {{ header }};
				{% endfor %}
			{% endif %}
			{% if hide_headers != "" %}
				{% for hide_header in hide_headers.split() %}
	grpc_hide_header {{ hide_header }};
				{% endfor %}
			{% endif %}
	grpc_connect_timeout {{ connect_timeout }};
	grpc_read_timeout {{ read_timeout }};
	grpc_send_timeout {{ send_timeout }};
	grpc_socket_keepalive {{ socket_keepalive }};
			{% if next_upstream != "" %}
	grpc_next_upstream {{ next_upstream }};
			{% endif %}
			{% if next_upstream_timeout != "" %}
	grpc_next_upstream_timeout {{ next_upstream_timeout }};
			{% endif %}
			{% if next_upstream_tries != "" %}
	grpc_next_upstream_tries {{ next_upstream_tries }};
			{% endif %}
			{% if includes != "" %}
				{% for include in includes.split() %}
	include {{ include }};
				{% endfor %}
			{% endif %}
}

	{% endfor %}
{%- endif %}
