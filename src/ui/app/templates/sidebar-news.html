{% from "components/drawer.html" import drawer %}
{% call drawer(id="side-offcanvas-news", theme=theme, newsletter=false) %}
    <div class="offcanvas-body position-relative ps-3 pe-3">
        <div id="data-news-container">
            <p class="text-center position-relative w-100 p-2 text-primary rounded-3 fw-bold"
               data-i18n="status.blog_connection_fail">Impossible to connect to blog news.</p>
        </div>
        <div class="text-center position-relative w-100 p-2 text-primary rounded-3 fw-bold mt-4">
            <a href="https://www.bunkerweb.io/blog?utm_campaign=self&utm_source=ui"
               class="text-decoration-underline link-underline-primary position-relative pe-4"
               target="_blank"
               rel="noopener"><span data-i18n="link.more_news">More news</span> <i class="bx bx-xs bx-right-arrow-alt position-absolute end-0 top-0 mt-0_5"></i></a>
        </div>
    </div>
    <!-- Newsletter Signup Section: rendered here (newsletter=false above) instead of via the
         macro's own newsletter slot -- see sidebar-notifications.html for why (i18n.js hardcodes
         the literal "#newsletter-email-check"/"#newsletter-locale" ids). -->
    <div class="newsletter-signup position-sticky bottom-0 start-0 w-100 p-4 bg-{% if theme == 'light' %}light{% else %}dark{% endif %}-subtle border-top">
        <h5 class="mb-3 text-primary" data-i18n="newsletter.title">Join the Newsletter</h5>
        <form action="https://sibforms.com/serve/MUIFAHoWe6WZdJ2ergvcJd8d2gn5T_x7bUzVM6jJd1FmAMfS6v-S9cUN3Iqw6DFiq7mRlDMvTXSIM9voEv8sCkZmEhtoDukSdI4BomhnTtgJAMXFkXUIj07KNw5gBWJ-1kPYCoSJlcabngBdufuqPnzGQ87UMecHcke3Hv2-AgAZOMYbCgKg2mx4ki8vhCkQtEpfBQhNZY22UY5y"
              method="POST"
              target="_blank">
            <input id="newsletter-email-check"
                   type="hidden"
                   name="email_address_check"
                   value="" />
            <input id="newsletter-locale" type="hidden" name="locale" value="en" />
            <div class="mb-3">
                <input type="email"
                       name="EMAIL"
                       class="form-control"
                       placeholder="John.doe@example.com"
                       required />
            </div>
            <div class="form-check mb-3">
                <input type="checkbox"
                       class="form-check-input"
                       id="news-privacyPolicyCheck"
                       name="OPT_IN"
                       required />
                <label class="form-check-label" for="news-privacyPolicyCheck">
                    <span data-i18n="newsletter.legal_agreement">I want to subscribe to the newsletter and I've read and agree to the:&nbsp;</span>
                    <a class="fst-italic"
                       href="https://www.bunkerity.com/en/privacy-policy?utm_campaign=self&utm_source=ui"
                       target="_blank"
                       rel="noopener"
                       data-i18n="link.privacy_policy">privacy policy</a>
                </label>
            </div>
            <button type="submit"
                    class="btn btn-primary w-100 text-uppercase don-jose"
                    data-i18n="button.subscribe">Subscribe</button>
        </form>
    </div>
    <!-- End Newsletter Signup Section -->
{% endcall %}
