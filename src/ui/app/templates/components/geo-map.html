{% from "components/card.html" import card %}
{% macro geo_map(id, title, title_key=none, data={}, card_classes="") -%}
    {% call card(classes=card_classes, title=title, title_key=title_key, separator=false) %}
        <div id="{{ id }}" class="w-100" aria-label="{{ title }}"></div>
        <div id="{{ id }}-data" class="visually-hidden">{{ data | tojson }}</div>
    {% endcall %}
{%- endmacro %}
