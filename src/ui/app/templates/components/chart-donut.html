{% from "components/card.html" import card %}
{% macro chart_donut(id, title, title_key=none, series={}, card_classes="") -%}
    {% call card(classes=card_classes, title=title, title_key=title_key, separator=false) %}
        <div id="{{ id }}" class="w-100"></div>
        <div id="{{ id }}-data" class="visually-hidden">{{ series | tojson }}</div>
    {% endcall %}
{%- endmacro %}
